   async function saveClaudeAsRecipe(messageIndex) {
      const message = state.chefChatMessages[messageIndex];
      if (!message) return;
      
      toggleChefChat(); // Close chat
      state.isLoading = true;
      render();
      showToast('Converting to recipe...', 'info');
      
      try {
        // Ask Claude to optimize into recipe format
        const response = await fetch(CHEF_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{
              role: 'user',
              content: `Convert this cooking information into a structured recipe. Return ONLY valid JSON (no markdown, no backticks, no explanation). Use this exact structure:
{
  "title": "Recipe Name",
  "category": "one of: Breakfast, Lunch, Dinner, Dessert, Snack, Beverage, Other",
  "servings": number,
  "prepTime": "e.g. 15 mins",
  "cookTime": "e.g. 30 mins", 
  "ingredients": [

  ],
  "instructions": ["Step 1 text", "Step 2 text", "Step 3 text"],
  "notes": "any tips or notes"
}

Content to convert:
${message.content}`
            }]
          })
        });
        
        const data = await response.json();
        
        if (data.content && data.content[0]?.text) {
          const text = data.content[0].text;
          
          let recipeData;
          try {
            let cleanText = text.trim();
            cleanText = cleanText.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '');
            
            const jsonMatch = cleanText.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              recipeData = JSON.parse(jsonMatch[0]);
            } else {
              throw new Error('No JSON found');
            }
          } catch (e) {
            console.error('Failed to parse:', e, text);
            showError('Could not convert to recipe format');
            state.isLoading = false;
            render();
            return;
          }
          
          // Show preview modal with claude source type
          showClaudeRecipePreviewModal(recipeData);
        } else {
          showError('Could not convert to recipe');
        }
      } catch (error) {

        showError('Failed to convert recipe');
      } finally {
        state.isLoading = false;
        render();
      }
    }

      ];

      const sortedByLength = [...produceAndProteins].sort((a, b) => b.length - a.length);

    function deleteConversation(topic, timestamp) {
      if (!confirm('Delete this conversation?')) return;
      
      // Find the start of this conversation and remove its messages
      const startIdx = state.chefChatMessages.findIndex(m => 
        m.timestamp === timestamp && m.role === 'user'
      );
      
      if (startIdx === -1) return;
      
      // Find where this conversation ends (next user message or end of array)
      let endIdx = startIdx + 1;
      while (endIdx < state.chefChatMessages.length) {
        if (state.chefChatMessages[endIdx].role === 'user') {
          // Check if this is a follow-up or new conversation
          const prevMsg = state.chefChatMessages[endIdx - 1];
          if (prevMsg && prevMsg.role === 'assistant') {
            break; // New conversation starts here
          }
        }
        endIdx++;
      }
      
      // Remove the messages
      state.chefChatMessages.splice(startIdx, endIdx - startIdx);
      saveChefChatHistory();
      renderChefChat();
      showToast('Conversation deleted', 'success');
    }
   function getChefChatHistory() {
      // Group messages into conversations by date and topic
      const conversations = [];
      let currentConvo = null;
      
      state.chefChatMessages.forEach((msg, idx) => {
        const msgDate = msg.timestamp ? new Date(msg.timestamp).toLocaleDateString() : 'Unknown';
        
        // Start a new conversation on each user message that follows an assistant message
        // or if it's the first message
        if (msg.role === 'user') {
          const prevMsg = state.chefChatMessages[idx - 1];
          
          if (!currentConvo || (prevMsg && prevMsg.role === 'assistant')) {
            // Get topic from first ~50 chars of user message
            const topic = msg.content.slice(0, 50) + (msg.content.length > 50 ? '...' : '');
            
            currentConvo = {
              date: msgDate,
              topic: topic,
              messages: [],
              timestamp: msg.timestamp
            };
            conversations.push(currentConvo);
          }
        }
        
        if (currentConvo) {
          currentConvo.messages.push(msg);
        }
      });
      
      // Group by date
      const grouped = {};
      conversations.forEach(convo => {
        if (!grouped[convo.date]) {
          grouped[convo.date] = [];
        }
        grouped[convo.date].push(convo);
      });
      
      // Sort dates descending (newest first)
      return Object.entries(grouped)
        .sort((a, b) => new Date(b[0]) - new Date(a[0]))
        .map(([date, convos]) => ({ date, conversations: convos }));
    }
   function formatChefMessage(text) {
      return text
        // Bold: **text** or __text__
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        // Italic: *text* or _text_
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        // Numbered lists: 1. item
        .replace(/^(\d+)\.\s+(.+)$/gm, '<div style="margin-left:1rem;">$1. $2</div>')
        // Bullet lists: - item or • item
        .replace(/^[-•]\s+(.+)$/gm, '<div style="margin-left:1rem;">• $1</div>')
        // Line breaks
        .replace(/\n/g, '<br>');
    }

    async function sendChefMessage() {
      const input = document.getElementById('chefChatInput');
      const message = input?.value.trim();
      
      if (!message || state.chefChatLoading) return;
      
     // Add user message
      state.chefChatMessages.push({

        content: message,
        timestamp: new Date().toISOString()
      });
      input.value = '';
      state.chefChatLoading = true;
      renderChefChat();
      
      try {
        // Get recipe context (current recipes for context)
        const recipeContext = state.recipes
          .filter(r => !r.isDraft && !r.isTip)
          .slice(0, 10)
          .map(r => r.title)
          .join(', ');
        
        const systemPrompt = `You are Chef Claude, a friendly cooking assistant for home cooks who may be beginners. 

When giving cooking instructions:
- Always include specific times (e.g., "cook for 3-4 minutes" not just "cook until done")
- Always include temperatures when relevant (e.g., "medium-high heat, about 375°F")
- Explain visual/sensory cues (e.g., "until golden brown" or "until juices run clear")
- Break down steps clearly - one action per step when possible
- Include timing for each major step
- Mention common mistakes to avoid
- If something needs resting time, say how long and why

Format cooking times clearly like:
- Prep: X minutes
- Cook: X minutes  
- Rest: X minutes (if applicable)

Keep responses helpful but concise. Use bullet points for steps.`;

        const response = await fetch(CHEF_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemPrompt: systemPrompt,
            messages: state.chefChatMessages.map(m => ({
              role: m.role,
              content: m.content

          })

        const data = await response.json();
        
        if (data.content && data.content[0]?.text) {
          state.chefChatMessages.push({
            role: 'assistant',
            content: data.content[0].text,
            timestamp: new Date().toISOString()
          });

    async function saveIngredientKnowledge(knowledge) {
      const existing = state.ingredientKnowledge.find(k => k.id === knowledge.id);
      
      if (existing) {
        Object.assign(existing, knowledge);
        await storage.update(knowledge);
      } else {
        state.ingredientKnowledge.push(knowledge);
        await storage.create(knowledge);
      }
    }

    async function saveEditedIngredientKnowledge() {
      const name = document.getElementById('editIngName').value;
      const id = document.getElementById('editIngId').value;
      
      const freezableVal = document.querySelector('input[name="freezable"]:checked')?.value;
      
      const knowledge = {
        id: id,
        type: 'ingredient_knowledge',
        name: name,
        category: document.getElementById('editIngCategory').value,
        season: document.getElementById('editIngSeason').value,
        storage: {
          location: document.getElementById('editIngStorageLoc').value,
          duration: document.getElementById('editIngStorageDur').value.trim()
        },
        freezable: freezableVal === 'yes' ? true : freezableVal === 'no' ? false : null,
        freezingInfo: {
          blanch: document.getElementById('editIngBlanch').value.trim(),
          duration: document.getElementById('editIngFreezeDur').value.trim(),
          instructions: document.getElementById('editIngFreezeInst').value.trim()
        },
        cookingMethods: getIngredientKnowledge(name)?.cookingMethods || [],
        pairings: getIngredientKnowledge(name)?.pairings || [],
        notes: getIngredientKnowledge(name)?.notes || [],
        updatedAt: new Date().toISOString()
      };
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Ingredient info saved!', 'success');
      render();
    }

    async function saveCookingMethod() {
      const name = document.getElementById('methodIngName').value;
      const method = {
        method: document.getElementById('newMethodType').value,
        temp: document.getElementById('newMethodTemp').value.trim(),
        time: document.getElementById('newMethodTime').value.trim(),
        notes: document.getElementById('newMethodNotes').value.trim()
      };
      
      if (!method.time) {
        showError('Please enter a cooking time');
        return;
      }
      
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.cookingMethods = knowledge.cookingMethods || [];
      knowledge.cookingMethods.push(method);
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Cooking method added!', 'success');
      render();
    }

    async function deleteCookingMethod(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.cookingMethods) {
        knowledge.cookingMethods.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }
   function addTechnique(name) {
      openModal(`
        <div style="color: #1a1a2e;">
          <h2 class="text-xl font-bold mb-4">👨‍🍳 Add Technique</h2>
          
          <div class="mb-4">
            <label class="block mb-2 font-semibold">🎯 Result (what you'll get):</label>
            <input type="text" id="newTechResult" class="w-full px-3 py-2 border rounded"
                   placeholder="e.g., Juicy with crispy skin" />
            <div class="text-xs text-gray-500 mt-1">This is what a novice cook will see first</div>
          </div>
          
          <div class="mb-4">
            <label class="block mb-2 font-semibold">Method name:</label>
            <input type="text" id="newTechMethod" class="w-full px-3 py-2 border rounded"
                   placeholder="e.g., Sear then Bake" />
          </div>
          
          <div class="mb-4">
            <label class="block mb-2 font-semibold">Steps:</label>
            <textarea id="newTechSteps" class="w-full px-3 py-2 border rounded" rows="4"
                      placeholder="1. Sear 2-3 min per side on stovetop&#10;2. Transfer to 400°F oven for 15-20 min&#10;3. Rest 5 min before cutting"></textarea>
          </div>
          
          <input type="hidden" id="techIngName" value="${esc(name)}" />
          
          <div class="flex gap-2 justify-end">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
              Cancel
            </button>
            <button onclick="saveTechnique()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
              Add Technique
            </button>
          </div>
        </div>
      `);
    }

    async function saveTechnique() {
      const name = document.getElementById('techIngName').value;
      const technique = {
        result: document.getElementById('newTechResult').value.trim(),
        method: document.getElementById('newTechMethod').value.trim(),
        steps: document.getElementById('newTechSteps').value.trim()
      };
      
      if (!technique.result) {
        showError('Please enter the result (what you\'ll get)');
        return;
      }
      if (!technique.steps) {
        showError('Please enter the steps');
        return;
      }
      
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.techniques = knowledge.techniques || [];
      knowledge.techniques.push(technique);
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Technique added!', 'success');
      render();
    }

    async function deleteTechnique(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.techniques) {
        knowledge.techniques.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }

    function addPairing(name) {
      const pairing = prompt('Enter an ingredient that pairs well with ' + name + ':');
      if (pairing && pairing.trim()) {
        savePairing(name, pairing.trim());
      }
    }

    async function savePairing(name, pairing) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.pairings = knowledge.pairings || [];
      if (!knowledge.pairings.includes(pairing.toLowerCase())) {
        knowledge.pairings.push(pairing.toLowerCase());
        await saveIngredientKnowledge(knowledge);
        showToast('Pairing added!', 'success');
        render();
      }
    }

    async function deletePairing(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.pairings) {
        knowledge.pairings.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }

    function addIngredientNote(name) {
      const note = prompt('Add a note about ' + name + ':');
      if (note && note.trim()) {
        saveIngredientNote(name, note.trim());
      }
    }

    async function saveIngredientNote(name, note) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.notes = knowledge.notes || [];
      knowledge.notes.push(note);
      await saveIngredientKnowledge(knowledge);
      showToast('Note added!', 'success');
      render();
    }

    async function deleteIngredientNote(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.notes) {
        knowledge.notes.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }

    function toggleIngredientFavorite(name) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      knowledge.favorite = !knowledge.favorite;
      saveIngredientKnowledge(knowledge);
      render();
    }

    function askClaudeAboutIngredient(name) {
      // Open chat with pre-filled question
      state.chefChatOpen = true;
      renderChefChat();
      
      setTimeout(() => {
        const input = document.getElementById('chefChatInput');
        if (input) {
          input.value = `Tell me about ${name}: cooking times for different methods, storage tips, what it pairs well with, and any freezing instructions.`;
          input.focus();
        }
      }, 100);
    }

    // ===== INITIALIZATION =====
    async function init() {
      await storage.init(dataHandler);
      // Check for expiring items after data loads
    setTimeout(() => {
      checkExpirationNotifications();
    }, 2000);
      setupKeyboardShortcuts();
      render();
      
      // Show welcome message on first load
      if (state.recipes.length === 0) {
        setTimeout(() => {
          showToast('Welcome! Press ⚙️ to view keyboard shortcuts', 'info');
        }, 500);
      }
    }

    init();
  </script>
</body>
</html>

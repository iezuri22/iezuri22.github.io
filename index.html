    // Parse narrative text to extract @mentions and #recording needs
    function parseNarrative(text) {
      const mentions = [];
      const recordingNeeds = [];
      
      const mentionRegex = /@\[([^\]]+)\]\(([^)]+)\)/g;
      let match;
      while ((match = mentionRegex.exec(text)) !== null) {
        mentions.push({ title: match[1], id: match[2], index: match.index });
      }
      
      const recordingRegex = /#\[([^\]]+)\]/g;
      while ((match = recordingRegex.exec(text)) !== null) {
        recordingNeeds.push({ text: match[1], index: match.index });
      }
      
      return { mentions, recordingNeeds };
    }

  // Convert narrative to display HTML
    function narrativeToHtml(text) {
      if (!text) return '';
      
      let html = esc(text);
      
      html = html.replace(/@\[([^\]]+)\]\(([^)]+)\)/g, (match, title, id) => {
        return `<span class="mention-tag cursor-pointer" onclick="openRecipeView('${id}')">${title}</span>`;
      });
      
      html = html.replace(/#\[([^\]]+)\]/g, (match, text) => {
        return `<span class="record-tag">${text}</span>`;
      });
      
      return html;
    }

 // Handle mention dropdown selection
    function selectMention(item) {
      const textarea = document.getElementById('narrativeEditor');
      if (!textarea) return;
      
      const text = textarea.value;
      const cursorPos = state.mentionCursorPosition;
      
      let startPos = cursorPos - 1;
      while (startPos >= 0 && text[startPos] !== '@' && text[startPos] !== '#') {
        startPos--;
      }
      
      let insertText;
      if (state.mentionDropdownType === '@') {
        // Recipe mention: @[Recipe Name](recipe_id)
        insertText = `@[${item.title}](${item.id})`;
      } else {
        // Ingredient/blend mention: #ingredient-name (kebab-case, no brackets)
        const kebabName = (item.name || item).toLowerCase().replace(/\s+/g, '-');
        insertText = `#${kebabName}`;
      }
      
      const newText = text.slice(0, startPos) + insertText + ' ' + text.slice(cursorPos);
      
      state.freestyleForm.narrative = newText;
      state.mentionDropdownVisible = false;
      
      render();
      
      setTimeout(() => {
        const newTextarea = document.getElementById('narrativeEditor');
        if (newTextarea) {
          newTextarea.focus();
          const newPos = startPos + insertText.length + 1;
          newTextarea.setSelectionRange(newPos, newPos);
        }
      }, 0);
    }

  
    // Handle narrative input with @ and # detection
    function handleNarrativeInput(e) {
      const textarea = e.target;
      const text = textarea.value;
      const cursorPos = textarea.selectionStart;
      
      state.freestyleForm.narrative = text;
      state.mentionCursorPosition = cursorPos;
      
      let startPos = cursorPos - 1;
      let triggerChar = null;
      
      while (startPos >= 0) {
        const char = text[startPos];
        if (char === '@' || char === '#') {
          triggerChar = char;
          break;
        }
        // Only break on newline, not space (allows "chicken thighs" search)
        if (char === '\n') {
          break;
        }
        startPos--;
      }
      
      const wasDropdownVisible = state.mentionDropdownVisible;
      
     if (triggerChar && startPos >= 0) {
        const searchTerm = text.slice(startPos + 1, cursorPos);
        // Allow spaces in search term (e.g., "chicken th" matches "Chicken Thighs")
        state.mentionSearchTerm = searchTerm.toLowerCase();
        state.mentionDropdownType = triggerChar;
        state.mentionDropdownVisible = true;
        state.mentionDropdownIndex = 0;
      } else {
        state.mentionDropdownVisible = false;
      }
      
     // Only re-render if dropdown state changed (not on every keystroke)
      if (wasDropdownVisible !== state.mentionDropdownVisible || state.mentionDropdownVisible) {
        // Update just the dropdown, not the whole page
        const dropdownContainer = document.getElementById('mentionDropdownContainer');
        if (dropdownContainer) {
          dropdownContainer.innerHTML = renderMentionDropdown();
        } else {
          // Fallback: full render if container not found
          render();
          setTimeout(() => {
            const newTextarea = document.getElementById('narrativeEditor');
            if (newTextarea) {
              newTextarea.focus();
              newTextarea.setSelectionRange(cursorPos, cursorPos);
            }
          }, 0);
        }
      }
    }
    
 // Helper to render just the dropdown

      const dropdownItems = state.mentionDropdownVisible ? getMentionDropdownItems() : [];

    // Handle keyboard navigation in mention dropdown
    function handleNarrativeKeydown(e) {
      if (!state.mentionDropdownVisible) return;
      
      const items = getMentionDropdownItems();
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        state.mentionDropdownIndex = Math.min(state.mentionDropdownIndex + 1, items.length - 1);
        render();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        state.mentionDropdownIndex = Math.max(state.mentionDropdownIndex - 1, 0);
        render();
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (items.length > 0) {
          e.preventDefault();
          selectMention(items[state.mentionDropdownIndex]);
        }
      } else if (e.key === 'Escape') {
        state.mentionDropdownVisible = false;
        render();
      }
    }

  // Get filtered items for mention dropdown
    function getMentionDropdownItems() {
      const search = state.mentionSearchTerm.toLowerCase();
      
      // Helper to capitalize each word
      const capitalize = (str) => str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
      
      if (state.mentionDropdownType === '@') {
        // @ = Recipes
        return state.recipes
          .filter(r => !r.isDraft)
          .filter(r => r.title.toLowerCase().includes(search))
          .slice(0, 8)
          .map(r => ({
            id: r.__backendId || r.id,
            title: r.title,
            type: 'recipe'
          }));
      } else {
        // # = Pantry items + Seasoning blends
        const results = [];
        
        // Add seasoning blends first
        (state.seasoningBlends || []).forEach(blend => {
          if (blend.name.toLowerCase().includes(search)) {
            results.push({
              name: capitalize(blend.name),
              type: 'blend'
            });
          }
        });
        
        // Add pantry items
        state.inventory.forEach(item => {
          if (item.name.toLowerCase().includes(search)) {
            results.push({
              name: capitalize(item.name),
              type: 'pantry'
            });
          }
        });
        
        // Add ingredient knowledge items not in pantry
        state.ingredientKnowledge.forEach(ing => {
          const alreadyAdded = results.some(r => r.name.toLowerCase() === ing.name.toLowerCase());
          if (!alreadyAdded && ing.name.toLowerCase().includes(search)) {
            results.push({
              name: capitalize(ing.name),
              type: 'ingredient'
            });
          }
        });
        
        // If search term doesn't match anything, allow custom entry
        if (search && !results.some(r => r.name.toLowerCase() === search)) {
          results.unshift({
            name: capitalize(search),
            type: 'custom'
          });
        }
        
        return results.slice(0, 10);
      }
    }

    async function saveFreestyle() {
      const form = state.freestyleForm;
      if (!form) return;
      
      if (!form.image_url && !form.narrative) {
        showError('Please add a photo or write about your meal');
        return;
      }
      
      // Extract mentions and recording needs from narrative
      const parsed = parseNarrative(form.narrative || '');
      const linkedRecipes = parsed.mentions.map(m => m.id);
      const recordingNeedsFromNarrative = parsed.recordingNeeds.map(r => r.text);
      
      const meal = {
        id: form.id || `freestyle_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        type: 'freestyle',
        date: form.date,
        image_url: form.image_url || '',
        narrative: form.narrative || '',
        notes: form.narrative || '', // Keep for backward compatibility
        linkedRecipes: linkedRecipes,
        tags: form.tags || []
      };
      
      try {
        if (form.id) {
          await storage.update(meal);
          state.freestyleMeals = state.freestyleMeals.map(m => m.id === meal.id ? meal : m);
        } else {
          await storage.create(meal);
          state.freestyleMeals = [...(state.freestyleMeals || []), meal];
        }
        
        // Create recording need items from #[...] tags
        for (const needText of recordingNeedsFromNarrative) {
          const existingNeed = state.recordingNeeds.find(r => 
            r.text.toLowerCase() === needText.toLowerCase() && !r.completed
          );
          
          if (!existingNeed) {
            const recordingNeed = {
              id: `recording_${Date.now()}_${Math.random().toString(36).slice(2)}`,
              type: 'recording_need',
              text: needText,
              sourceFreestyleId: meal.id,
              createdAt: new Date().toISOString(),
              completed: false
            };
            await storage.create(recordingNeed);
            state.recordingNeeds.push(recordingNeed);
          }
        }
        
        state.freestyleForm = null;
        state.currentView = 'recipes';
        state.recipeTab = 'freestyle';
        render();
        showToast('Freestyle meal saved!', 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to save');
      }
    }

                <button onclick="addFreestyleTag(document.getElementById('newTagInput').value); document.getElementById('newTagInput').value = '';"

              ${allTags.length > 0 ? `

                      <button onclick="addFreestyleTag('${tag}')"

   function renderRecipes() {
      if (!state.recipes || !Array.isArray(state.recipes)) return '<div class="p-3">Loading...</div>';
      
      if (!state.recipeTab) state.recipeTab = 'user';
      
      const userCount = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'user').length;
      const freestyleCount = (state.freestyleMeals || []).length;
      const chefiqCount = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'chefiq').length;
      const importedCount = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'imported').length;
      const claudeCount = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'claude').length;
      
      if (state.recipeTab === 'freestyle') {
        return renderFreestyleMeals();
      }
      
      let list;
      if (state.recipeTab === 'tips') {
        list = state.recipes.filter(r => r.isTip);
      } else if (state.recipeTab === 'chefiq') {
        list = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'chefiq');
      } else if (state.recipeTab === 'imported') {
        list = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'imported');
      } else if (state.recipeTab === 'claude') {
        list = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'claude');
      } else {
        list = state.recipes.filter(r => !r.isDraft && !r.isTip && r.sourceType === 'user');
      }

      list = list.filter(r => {
        if (state.filterFavorites && !r.favorite) return false;
        if (state.recipeTab !== 'tips' && state.selectedCategory !== 'All' && r.category !== state.selectedCategory) return false;
        if (state.searchTerm) {
          const searchLower = state.searchTerm.toLowerCase();
          if (state.searchByIngredient) {
            const ingredients = recipeIngList(r);
            const hasIngredient = ingredients.some(ing => (ing.name || '').toLowerCase().includes(searchLower));
            if (!hasIngredient) return false;
          } else {
            if (!(r.title || '').toLowerCase().includes(searchLower)) return false;
          }
        }
        if (state.filterIngredientGroup !== 'all') {
          const recipeIngredients = recipeIngList(r);
          const hasIngredientInGroup = recipeIngredients.some(ing => ing.group === state.filterIngredientGroup);
          if (!hasIngredientInGroup) return false;
        }
        return true;
      });

      return `
        <div class="p-3 max-w-7xl mx-auto">
          <!-- Header -->
          <div class="flex items-center justify-between mb-3 gap-2 flex-wrap">
            <div class="flex items-center gap-1 flex-wrap">
              <button onclick="state.recipeTab = 'user'; render();" 
                class="px-2 py-1 rounded"
                style="background:${state.recipeTab === 'user' || !state.recipeTab ? CONFIG.primary_action_color : CONFIG.surface_color}; color:${state.recipeTab === 'user' || !state.recipeTab ? 'white' : CONFIG.text_color}; font-size:11px; border: none;">
                Recipes (${userCount})
              </button>
              <button onclick="state.recipeTab = 'freestyle'; render();"
                class="px-2 py-1 rounded"
                style="background:${state.recipeTab === 'freestyle' ? CONFIG.primary_action_color : CONFIG.surface_color}; color:${state.recipeTab === 'freestyle' ? 'white' : CONFIG.text_color}; font-size:11px; border: none;">
                Journal (${freestyleCount})
              </button>
              <button onclick="state.recipeTab = 'chefiq'; render();" 
                class="px-2 py-1 rounded"
                style="background:${state.recipeTab === 'chefiq' ? CONFIG.primary_action_color : CONFIG.surface_color}; color:${state.recipeTab === 'chefiq' ? 'white' : CONFIG.text_color}; font-size:11px; border: none;">
                ChefIQ (${chefiqCount})
              </button>
              <button onclick="state.recipeTab = 'imported'; render();" 
                class="px-2 py-1 rounded"
                style="background:${state.recipeTab === 'imported' ? CONFIG.primary_action_color : CONFIG.surface_color}; color:${state.recipeTab === 'imported' ? 'white' : CONFIG.text_color}; font-size:11px; border: none;">
                Imported (${importedCount})
              </button>
              <button onclick="state.recipeTab = 'claude'; render();" 
                class="px-2 py-1 rounded"
                style="background:${state.recipeTab === 'claude' ? CONFIG.primary_action_color : CONFIG.surface_color}; color:${state.recipeTab === 'claude' ? 'white' : CONFIG.text_color}; font-size:11px; border: none;">
                Claude (${claudeCount})
              </button>
            </div>
            <div class="flex gap-1">
              <button type="button" onclick="showImportRecipeModal()"
                class="px-2 py-1 rounded"
                style="background:${CONFIG.surface_color}; color:${CONFIG.text_color}; font-size:11px; border: none;">
                Import
              </button>
              <button type="button" onclick="openNewRecipe()"
                class="px-2 py-1 rounded"
                style="background:${CONFIG.primary_action_color}; color:white; font-size:11px; border: none;">
                + New
              </button>
            </div>
          </div>

          <!-- Filters -->
          <details class="mb-3">
            <summary class="cursor-pointer px-3 py-2 rounded-lg" style="background:${CONFIG.surface_color}; color:${CONFIG.text_color}; font-size:12px; list-style:none;">
              Filters ${state.selectedCategory !== 'All' || state.filterFavorites || state.filterIngredientGroup !== 'all' ? '•' : ''}
            </summary>
            <div class="mt-2 p-3 rounded-lg" style="background:${CONFIG.surface_color};">
              <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <input placeholder="${state.searchByIngredient ? 'Search by ingredient...' : 'Search recipes...'}" 
                  class="flex-1 px-3 py-2 rounded-lg"
                  style="background:${CONFIG.background_color}; color:${CONFIG.text_color}; border:1px solid rgba(0,0,0,0.1); font-size:13px;"
                  value="${esc(state.searchTerm || '')}"
                  oninput="state.searchTerm = this.value; render();"/>
                <button onclick="state.searchByIngredient = !state.searchByIngredient; state.searchTerm = ''; render();"
                  style="padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; background: ${state.searchByIngredient ? CONFIG.primary_action_color : CONFIG.surface_color}; color: ${state.searchByIngredient ? 'white' : CONFIG.text_color};">
                  ${state.searchByIngredient ? 'Ingredient' : 'Name'}
                </button>
              </div>
              <div class="flex gap-2 mb-3 flex-wrap">
                <select onchange="state.selectedCategory=this.value; render();"
                  style="background:${CONFIG.background_color}; color:${CONFIG.text_color}; border:1px solid rgba(0,0,0,0.1); font-size:12px; padding:8px; border-radius:8px; flex:1;">
                  <option value="All" ${state.selectedCategory === 'All' ? 'selected' : ''}>All Categories</option>
                  ${MEAL_CATEGORIES.map(c => `<option value="${c}" ${state.selectedCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
              </div>
              <label class="flex items-center gap-2 cursor-pointer" style="color:${CONFIG.text_color}; font-size:13px;">
                <input type="checkbox" ${state.filterFavorites ? 'checked' : ''} onchange="state.filterFavorites=this.checked; render();" style="width: 16px; height: 16px;">
                Favorites Only
              </label>
            </div>
          </details>

          <!-- Results -->
          ${list.length === 0 ? `
            <div class="p-6 rounded-xl text-center" style="background:${CONFIG.surface_color};">
              <div style="font-size: 2rem; margin-bottom: 8px;">📭</div>
              <div style="font-size: 14px; font-weight: 600; color: ${CONFIG.text_color}; margin-bottom: 4px;">
                ${state.searchTerm ? 'No matches found' : 'No recipes yet'}
              </div>
              <div style="font-size: 12px; color: ${CONFIG.text_muted}; margin-bottom: 12px;">
                ${state.searchTerm ? 'Try a different search' : 'Add your first recipe!'}
              </div>
              ${!state.searchTerm ? `
                <button onclick="openNewRecipe()" style="padding: 8px 16px; background: ${CONFIG.primary_action_color}; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px;">
                  + Add Recipe
                </button>
              ` : ''}
            </div>
          ` : `
            <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2">
              ${list.map(r => {
                const id = r.__backendId || r.id;
                const img = recipeThumb(r);
                return `
                <div class="rounded-lg overflow-hidden cursor-pointer"
                  onclick="openRecipeView('${id}')"
                  style="background:${CONFIG.surface_color};">
                  ${img ? `
                    <div style="height:70px; overflow:hidden;">
                      <img src="${esc(img)}" style="width:100%; height:100%; object-fit:cover;" />
                    </div>
                  ` : `
                    <div style="height:70px; background:${CONFIG.background_color}; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
                      🍽️
                    </div>
                  `}
                  <div class="p-2">
                    <div class="truncate" style="color:${CONFIG.text_color}; font-size:11px; font-weight:500;">
                      ${esc(r.title)} ${r.favorite ? '⭐' : ''}
                    </div>
                    <div style="color:${CONFIG.text_muted}; font-size:9px;">
                      ${r.category || 'Recipe'}
                    </div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          `}
        </div>
      `;
    }

    function renderRecipeEdit() {
      if (!state.recipeForm) return '';

      return `
        <div class="p-6 max-w-5xl mx-auto">

      const r = getRecipeById(state.selectedRecipeViewId);

      const img = recipeThumb(r);

      const instructions = Array.isArray(r.instructions) 
        ? r.instructions.join('\n') 
        : (r.instructions || '').trim();
const sourceLabel = r.sourceType === 'chefiq' ? '🤖 ChefIQ Guided' : 
                          r.sourceType === 'imported' ? '🔗 Imported' : 
                          r.sourceType === 'claude' ? '🤖 Chef Claude' : '👤 User-Created';
      let rows = [];
      if (Array.isArray(r.ingredientsRows) && r.ingredientsRows.length > 0) {
        rows = r.ingredientsRows;
      } else if (Array.isArray(r.ingredients) && r.ingredients.length > 0) {
        // Handle imported recipes with old format
        rows = r.ingredients.map(ing => ({
          qty: ing.amount || '',
          unit: ing.unit || '',
          name: ing.item || ing.name || '',
          group: ing.group || 'Other'
        }));
      }
      const grouped = {};
      rows.forEach(x => {
        const g = x.group || 'Other';
        if (!grouped[g]) grouped[g] = [];
        grouped[g].push(x);
      });
      const groupOrder = Object.keys(grouped);

    // Parse instructions into steps - group numbered steps with their sub-instructions
      const instructionSteps = [];
      if (instructions) {
        const lines = instructions.split('\n');
        let currentStep = null;
        
        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) return;
          
          // Check if line starts with a number (e.g., "1.", "2.", etc.)
          if (/^\d+[\.\)]\s*/.test(trimmed)) {
            if (currentStep) instructionSteps.push(currentStep);
            currentStep = { header: trimmed, details: [] };
          } else if (currentStep) {
            currentStep.details.push(trimmed);
          } else {
            // Line without a number and no current step - treat as standalone
            instructionSteps.push({ header: null, details: [trimmed] });
          }
        });
        
        if (currentStep) instructionSteps.push(currentStep);
      }

   function getWeekExpenses(weekStartDate) {
      const weekDates = getWeekDates(weekStartDate);
      if (!state.budgetExpenses || !Array.isArray(state.budgetExpenses)) {
        return { grocery: 0, takeout: 0, total: 0, expenses: [], budget: 0, groceryBudget: 0, takeoutBudget: 0 };
      }
      const expenses = state.budgetExpenses.filter(e => weekDates.includes(e.date));
      
      const grocery = expenses.filter(e => e.type === 'grocery').reduce((sum, e) => sum + e.amount, 0);
      const takeout = expenses.filter(e => e.type === 'takeout').reduce((sum, e) => sum + e.amount, 0);
      
   // Determine budget for this week
      const today = new Date();
      const weekStart = new Date(weekStartDate + 'T00:00:00');
      const currentWeekStart = new Date(today);
      currentWeekStart.setDate(today.getDate() - today.getDay());
      currentWeekStart.setHours(0, 0, 0, 0);
      
      const isCurrentOrFutureWeek = weekStart >= currentWeekStart;
      const hasExpenses = expenses.length > 0;
      
      // Check for per-week budget override
      const weekBudget = state.weekBudgets?.find(b => b.weekStart === weekStartDate);
      
      let groceryBudget, takeoutBudget;
      
      if (weekBudget) {
        // Use per-week budget if set
        groceryBudget = weekBudget.grocery;
        takeoutBudget = weekBudget.takeout;
      } else if (isCurrentOrFutureWeek || hasExpenses) {
        // Current/future weeks OR past weeks with expenses get the default budget
        groceryBudget = state.groceryBudget;
        takeoutBudget = state.takeoutBudget;
      } else {
        // Past weeks with no expenses get $0 budget (excluded from stats)
        groceryBudget = 0;
        takeoutBudget = 0;
      }
      
      const budget = groceryBudget + takeoutBudget;
      
      return { grocery, takeout, total: grocery + takeout, expenses, budget, groceryBudget, takeoutBudget };
    }

    }

    function handleDragStart(e, date, meal, recipeId) {
      state.draggedMeal = { date, meal, recipeId };

      e.dataTransfer.effectAllowed = 'move';

      e.target.style.opacity = '1';
      state.draggedMeal = null;
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }

    function handleDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');

    async function handleDrop(e, targetDate, targetMeal) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      
      if (!state.draggedMeal) return;
      
      const { date: sourceDate, meal: sourceMeal, recipeId } = state.draggedMeal;
      
      if (sourceDate === targetDate && sourceMeal === targetMeal) {
        state.draggedMeal = null;
        return;
      }
      
      state.isLoading = true;
      render();
      
      try {
        const sourcePlan = state.planData.find(p => p.date === sourceDate);
        if (sourcePlan) {
          const sourceMealKey = sourceMeal.toLowerCase();
          sourcePlan[sourceMealKey] = (sourcePlan[sourceMealKey] || []).filter(id => id !== recipeId);
          await storage.update(sourcePlan);
        }
        
        let targetPlan = state.planData.find(p => p.date === targetDate);
        const targetMealKey = targetMeal.toLowerCase();
        
        if (!targetPlan) {
          targetPlan = {
            id: `plan_${targetDate}`,
            date: targetDate,
            breakfast: [],
            lunch: [],
            dinner: []
          };
          targetPlan[targetMealKey] = [recipeId];
          await storage.create(targetPlan);
        } else {
          if (!targetPlan[targetMealKey]) targetPlan[targetMealKey] = [];
          if (!targetPlan[targetMealKey].includes(recipeId)) {
            targetPlan[targetMealKey].push(recipeId);
          }
          await storage.update(targetPlan);
        }
        
        showToast('Meal moved!', 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to move meal');
      } finally {
        state.draggedMeal = null;
        state.isLoading = false;
        render();
      }
    }

    // ===== MEAL PLANNING HELPERS =====
  function getRecipeSuggestions(filterTerm = '') {
      let recipes = state.recipes.filter(r => !r.isDraft && !r.isTip && r.id?.startsWith('recipe_'));
      if (recipes.length === 0) return [];
      
      // Apply user's filter if provided
      if (filterTerm) {
        const term = filterTerm.toLowerCase();
        recipes = recipes.filter(r => {
          // Search in title
          if (r.title?.toLowerCase().includes(term)) return true;
          // Search in category
          if (r.category?.toLowerCase().includes(term)) return true;
          // Search in ingredients
          if (r.ingredients?.some(ing => ing.item?.toLowerCase().includes(term))) return true;
       // Search in tags
          if (Array.isArray(r.tags) && r.tags.some(tag => tag.toLowerCase().includes(term))) return true;
          return false;
        });
      }
      
      const usageMap = {};
      
      state.planData.forEach(plan => {
        ['breakfast', 'lunch', 'dinner'].forEach(meal => {
          (plan[meal] || []).forEach(id => {
            if (!usageMap[id]) {
              usageMap[id] = { count: 0, lastUsed: null };
            }
            usageMap[id].count++;
            if (!usageMap[id].lastUsed || plan.date > usageMap[id].lastUsed) {
              usageMap[id].lastUsed = plan.date;
            }
          });
        });
      });
      
      const scored = recipes.map(recipe => {
        const id = recipe.__backendId || recipe.id;
        const usage = usageMap[id] || { count: 0, lastUsed: null };
        
        let score = 0;
        
        if (usage.count === 0) {
          score = 1000;
        } else {
          if (usage.lastUsed) {
            const daysSince = Math.floor((new Date() - new Date(usage.lastUsed)) / (1000 * 60 * 60 * 24));
            score = daysSince;
          }
        }
        
        return { recipe, score, usage };
      });
      
      scored.sort((a, b) => b.score - a.score);
      
      return scored.slice(0, 10);
    }

    async function addManualGroceryItem() {
      const nameInput = document.getElementById('manualItemName');
      const groupSelect = document.getElementById('manualItemGroup');
      
      const itemName = nameInput.value.trim();
      const itemGroup = groupSelect.value;
      
      if (!itemName) {
        showError('Please enter an item name');
        return;
      }

      const ingredientKey = normalizeIngredient(itemName);
      
      const manualSelId = `mealSel_manual_${Date.now()}`;
      const manualSel = {
        id: manualSelId,
        mealDate: 'manual',
        meal: 'manual',
        recipeId: 'manual',
        manualItem: {
          name: itemName,
          group: itemGroup
        },
        includedIngredientKeys: JSON.stringify([ingredientKey])
      };

      state.isLoading = true;
      closeModal();
      render();

      try {
        await storage.create(manualSel);
        showToast('Item added to grocery list!', 'success');
      } catch (e) {
        showError('Failed to add item');
        console.error(e);
      } finally {
        state.isLoading = false;
        render();
      }
    }

function renderGroceryByMeal(unchecked, checked) {
  // Group ingredients by their source meal
  const byMeal = {};
  const byCategory = {};
  
  state.mealSelections.forEach(sel => {
    const parts = sel.id.split('_');
    const recipeIdFromSel = parts.slice(3).join('_');
    
    // Handle manual items separately
    if (recipeIdFromSel === 'manual' && sel.manualItem) {
      const group = sel.manualItem.group || 'Other';
      if (!byCategory[group]) byCategory[group] = [];
      
      const item = unchecked.find(i => normalizeIngredient(i.name) === normalizeIngredient(sel.manualItem.name)) ||
                   checked.find(i => normalizeIngredient(i.name) === normalizeIngredient(sel.manualItem.name));
      if (item) byCategory[group].push(item);
      return;
    }
    
    const recipe = getRecipeById(recipeIdFromSel);
    if (!recipe) return;
    
    const mealKey = `${recipe.title}`;
    if (!byMeal[mealKey]) {
      byMeal[mealKey] = { recipe, ingredients: [] };
    }
    
    let keys = [];
    try {
      keys = JSON.parse(sel.includedIngredientKeys || '[]');
    } catch (e) {
      keys = [];
    }
    
    recipeIngList(recipe).forEach(ing => {
      const k = normalizeIngredient(ing.name);
      if (!keys.includes(k)) return;
      
      const item = unchecked.find(i => normalizeIngredient(i.name) === k) ||
                   checked.find(i => normalizeIngredient(i.name) === k);
      if (item && !byMeal[mealKey].ingredients.some(i => normalizeIngredient(i.name) === k)) {
        byMeal[mealKey].ingredients.push(item);
      }
    });
  });
  
  const sortedGroups = ING_GROUPS.filter(g => byCategory[g]);
  Object.keys(byCategory).forEach(g => {
    if (!ING_GROUPS.includes(g)) sortedGroups.push(g);
  });
  
  return `
    <!-- From Meals Section -->
    ${Object.keys(byMeal).length > 0 ? `
      <div class="mb-6">
        <h3 style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.125}px;" class="font-semibold mb-4">
          🍽️ From Meals
        </h3>
        ${Object.entries(byMeal).map(([mealName, data]) => `
          <div class="mb-4">
            <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.05}px; opacity: 0.9; font-weight: 600; padding: 8px 0; border-bottom: 2px solid rgba(102, 126, 234, 0.3); margin-bottom: 8px;">
              ${esc(mealName)}
            </div>
            ${data.ingredients.map(item => {
              const capitalizedName = item.name.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
              ).join(' ');
              
              return `
                <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size}px; ${item.checked ? 'opacity: 0.5; text-decoration: line-through;' : ''}"
                     class="flex items-center justify-between gap-3 p-3 rounded hover:bg-opacity-50">
                  <label class="flex items-center gap-3 cursor-pointer flex-1">
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleGroceryItem('${normalizeIngredient(item.name)}')">
                    <span>${capitalizedName}</span>
                  </label>
                  <button type="button" onclick="removeFromGroceryList('${normalizeIngredient(item.name)}')"
                    class="px-2 py-1 rounded button-hover"
                    style="background:#dc2626; color:white; font-size:${CONFIG.font_size * 0.85}px;">
                    Delete
                  </button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    ` : ''}
    
    <!-- By Category Section -->
    ${sortedGroups.length > 0 ? `
      <div>
        <h3 style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.125}px;" class="font-semibold mb-4">
          📦 By Category
        </h3>
        ${sortedGroups.map(group => `
          <div class="mb-4">
            <div style="color: ${CONFIG.text_color}; font-size: ${CONFIG.font_size * 1.05}px; font-weight: 600; padding: 8px 0; border-bottom: 2px solid rgba(0,0,0,0.1); margin-bottom: 8px;">
                    ${esc(group)}
                  </div>
            ${byCategory[group].map(item => {
              const capitalizedName = item.name.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
              ).join(' ');
              
              return `
                <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size}px; ${item.checked ? 'opacity: 0.5; text-decoration: line-through;' : ''}"
                     class="flex items-center justify-between gap-3 p-3 rounded hover:bg-opacity-50">
                  <label class="flex items-center gap-3 cursor-pointer flex-1">
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleGroceryItem('${normalizeIngredient(item.name)}')">
                    <span>${capitalizedName}</span>
                  </label>
                  <button type="button" onclick="removeFromGroceryList('${normalizeIngredient(item.name)}')"
                    class="px-2 py-1 rounded button-hover"
                    style="background:#dc2626; color:white; font-size:${CONFIG.font_size * 0.85}px;">
                    Delete
                  </button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    ` : ''}
`;
}

    async function importRecipeFromUrl() {
      const url = document.getElementById('importRecipeUrl')?.value.trim();
      
      if (!url) {
        showError('Please enter a URL');
        return;
      }
      
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showError('Please enter a valid URL starting with http:// or https://');
        return;
      }
      
      closeModal();
      state.isLoading = true;
      render();
      showToast('Importing recipe...', 'info');
      
      try {
        const response = await fetch(CHEF_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fetchUrl: url,
            messages: [{
              role: 'user',
              content: `Extract the recipe from this HTML and return ONLY valid JSON (no markdown, no backticks, no explanation). Use this exact structure:
{
  "title": "Recipe Name",
  "category": "one of: Breakfast, Lunch, Dinner, Dessert, Snack, Beverage, Other",
  "servings": number,
  "prepTime": "e.g. 15 mins",
  "cookTime": "e.g. 30 mins", 
  "ingredients": [
    {"item": "ingredient name", "amount": "quantity", "unit": "unit of measure", "group": "one of: Proteins, Vegetables, Carbs, Dairy, Fruits, Seasonings, Oils, Sweeteners, Other"}
  ],
  "instructions": ["Step 1 text", "Step 2 text", "Step 3 text"],
  "notes": "any tips or notes from the recipe",
  "sourceUrl": "${url}"
}`
            }]
          })
        });
        
        const data = await response.json();
        
        if (data.error) {
          showError(data.error);
          state.isLoading = false;
          render();
          return;
        }
        
        if (data.content && data.content[0]?.text) {
          const text = data.content[0].text;
          
          let recipeData;
          try {
            let cleanText = text.trim();
            cleanText = cleanText.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '');
            
            const jsonMatch = cleanText.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              recipeData = JSON.parse(jsonMatch[0]);
            } else {
              throw new Error('No JSON found in response');
            }
          } catch (e) {
            console.error('Failed to parse recipe JSON:', e, text);
            showError('Could not parse recipe data. Please try a different URL.');
            state.isLoading = false;
            render();
            return;
          }
          
          showImportPreviewModal(recipeData, url);
        } else {
          showError('Could not fetch recipe. Please try a different URL.');
        }
      } catch (error) {
        console.error('Import error:', error);
        showError('Failed to import recipe. Please check the URL and try again.');
      } finally {
        state.isLoading = false;
        render();
      }
    }

      const title = document.getElementById('importTitle')?.value.trim();
      const category = document.getElementById('importCategory')?.value;
      const servings = parseInt(document.getElementById('importServings')?.value) || 4;
      const prepTime = document.getElementById('importPrepTime')?.value.trim();
      const cookTime = document.getElementById('importCookTime')?.value.trim();
      const notes = document.getElementById('importNotes')?.value.trim();
      const image = document.getElementById('importImage')?.value.trim();
      const sourceUrl = document.getElementById('importSourceUrl')?.value;
      
      // Parse ingredients from textarea
      const ingredientsText = document.getElementById('importIngredients')?.value || '';
      const ingredientsData = JSON.parse(document.getElementById('importIngredientsData')?.value || '[]');
      
      // Parse instructions from textarea
      const instructionsText = document.getElementById('importInstructions')?.value || '';
      const instructions = instructionsText
        .split('\n')
        .map(line => line.replace(/^\d+\.\s*/, '').trim())
        .filter(line => line.length > 0);
      
      if (!title) {
        showError('Please enter a recipe title');
        return;
      }
      
     // Create recipe object
      const recipe = {
        id: `recipe_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        title: title,
        category: category,
        servings: servings,
        prepTime: prepTime,
        cookTime: cookTime,
        ingredientsRows: ingredientsData.map(ing => ({
          qty: ing.amount || '',
          unit: ing.unit || '',
          name: ing.item || '',
          group: ing.group || 'Other'
        })),
        instructions: instructions.join('\n'),
        notes: notes,
        image: image || null,
        sourceUrl: sourceUrl,
        sourceType: 'imported',
        favorite: false,
        isDraft: false,
        createdAt: new Date().toISOString()
      };
      
      closeModal();
      state.isLoading = true;
      render();
      
      try {
        await storage.create(recipe);
        showToast(`"${title}" imported successfully!`, 'success');
      } catch (e) {
        console.error('Save error:', e);
        showError('Failed to save recipe');
      } finally {
        state.isLoading = false;
        render();
      }
    }
   
   // ===== COOKING TIMER =====
  let activeAlarms = [];

   function playTimerSound(timerId) {
      // Use pre-unlocked context if available, otherwise create new
      const audioCtx = window._timerAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
      
      function playBeeps() {
        [0, 0.2, 0.4].forEach(delay => {
          try {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = 880;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + delay);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + 0.15);
            
            oscillator.start(audioCtx.currentTime + delay);
            oscillator.stop(audioCtx.currentTime + delay + 0.15);
          } catch(e) {}
        });
      }
      
      playBeeps();
      const interval = setInterval(playBeeps, 1000);
      
      activeAlarms.push({
        id: timerId,
        interval: interval,
        audioCtx: audioCtx
      });
    }

      const content = document.getElementById('claudeTipContent')?.value.trim();
      const checkboxes = document.querySelectorAll('input[name="tipIngredients"]:checked');
      const selectedIngredients = Array.from(checkboxes).map(cb => cb.value.toLowerCase());
      
      if (!title) {
        showError('Please enter a tip title');
        return;
      }
      
      if (selectedIngredients.length === 0) {
        showError('Please select at least one ingredient');
        return;
      }
      
      closeModal();
      state.isLoading = true;
      render();
      
      try {
        // Save tip to each selected ingredient
        for (const ingredientName of selectedIngredients) {
          let knowledge = getIngredientKnowledge(ingredientName);
          if (!knowledge) {
            knowledge = createDefaultIngredientKnowledge(ingredientName);
          }
          
          knowledge.notes = knowledge.notes || [];
          knowledge.notes.push(`💡 ${title}\n${content}`);
          
          await saveIngredientKnowledge(knowledge);
        }
        
        showToast(`Tip saved to ${selectedIngredients.length} ingredient${selectedIngredients.length > 1 ? 's' : ''}!`, 'success');
      } catch (e) {
        console.error('Save error:', e);
        showError('Failed to save tip');
      } finally {
        state.isLoading = false;
        render();
      }
    }

    function deleteConversation(topic, timestamp) {
      if (!confirm('Delete this conversation?')) return;
      
      // Find the start of this conversation and remove its messages
      const startIdx = state.chefChatMessages.findIndex(m => 
        m.timestamp === timestamp && m.role === 'user'
      );
      
      if (startIdx === -1) return;
      
      // Find where this conversation ends (next user message or end of array)
      let endIdx = startIdx + 1;
      while (endIdx < state.chefChatMessages.length) {
        if (state.chefChatMessages[endIdx].role === 'user') {
          // Check if this is a follow-up or new conversation
          const prevMsg = state.chefChatMessages[endIdx - 1];
          if (prevMsg && prevMsg.role === 'assistant') {
            break; // New conversation starts here
          }
        }
        endIdx++;
      }
      
      // Remove the messages
      state.chefChatMessages.splice(startIdx, endIdx - startIdx);
      saveChefChatHistory();
      renderChefChat();
      showToast('Conversation deleted', 'success');
    }
   function getChefChatHistory() {
      // Group messages into conversations by date and topic
      const conversations = [];
      let currentConvo = null;
      
      state.chefChatMessages.forEach((msg, idx) => {
        const msgDate = msg.timestamp ? new Date(msg.timestamp).toLocaleDateString() : 'Unknown';
        
        // Start a new conversation on each user message that follows an assistant message
        // or if it's the first message
        if (msg.role === 'user') {
          const prevMsg = state.chefChatMessages[idx - 1];
          
          if (!currentConvo || (prevMsg && prevMsg.role === 'assistant')) {
            // Get topic from first ~50 chars of user message
            const topic = msg.content.slice(0, 50) + (msg.content.length > 50 ? '...' : '');
            
            currentConvo = {
              date: msgDate,
              topic: topic,
              messages: [],
              timestamp: msg.timestamp
            };
            conversations.push(currentConvo);
          }
        }
        
        if (currentConvo) {
          currentConvo.messages.push(msg);
        }
      });
      
      // Group by date
      const grouped = {};
      conversations.forEach(convo => {
        if (!grouped[convo.date]) {
          grouped[convo.date] = [];
        }
        grouped[convo.date].push(convo);
      });
      
      // Sort dates descending (newest first)
      return Object.entries(grouped)
        .sort((a, b) => new Date(b[0]) - new Date(a[0]))
        .map(([date, convos]) => ({ date, conversations: convos }));
    }
   function formatChefMessage(text) {
      return text
        // Bold: **text** or __text__
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        // Italic: *text* or _text_
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        // Numbered lists: 1. item
        .replace(/^(\d+)\.\s+(.+)$/gm, '<div style="margin-left:1rem;">$1. $2</div>')
        // Bullet lists: - item or • item
        .replace(/^[-•]\s+(.+)$/gm, '<div style="margin-left:1rem;">• $1</div>')
        // Line breaks
        .replace(/\n/g, '<br>');
    }

    async function saveNewIngredient() {
      const name = document.getElementById('newIngredientName')?.value.trim();
      const category = document.getElementById('newIngredientCategory')?.value;
      const imageUrl = document.getElementById('newIngredientImage')?.value.trim();
      const notes = document.getElementById('newIngredientNotes')?.value.trim();
      
      if (!name) {
        showError('Please enter an ingredient name');
        return;
      }
      
      const normalizedName = name.toLowerCase();
      
      // Check if already exists
      const existing = state.ingredientKnowledge.find(k => k.name.toLowerCase() === normalizedName);
      if (existing) {
        showError('This ingredient already exists');
        return;
      }
      
      const knowledge = {
        id: `ingredient_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        type: 'ingredient_knowledge',
        name: normalizedName,
        category: category || 'Other',
        image_url: imageUrl || '',
        notes: notes ? [notes] : [],
        cookingMethods: [],
        pairings: [],
        favorite: false,
        createdAt: new Date().toISOString()
      };
      
      await storage.create(knowledge);
      state.ingredientKnowledge.push(knowledge);
      
      // Also add to INGREDIENT_IMAGES if image provided
      if (imageUrl) {
        INGREDIENT_IMAGES[normalizedName] = imageUrl;
      }
      
      closeModal();
      showToast(`${name} added!`, 'success');
      render();
    }

  async function deleteIngredient(name) {
      if (!confirm(`Delete ${name} from your ingredient library?`)) return;
      
      const normalizedName = name.toLowerCase();
      
      // Delete from ingredient knowledge
      const knowledge = state.ingredientKnowledge.find(k => k.name.toLowerCase() === normalizedName);
      if (knowledge) {
        state.ingredientKnowledge = state.ingredientKnowledge.filter(k => k.id !== knowledge.id);
        await storage.delete(knowledge);
      }
      
      // Track as deleted so it doesn't show up from INGREDIENT_IMAGES
      if (!state.deletedIngredients.includes(normalizedName)) {
        state.deletedIngredients.push(normalizedName);
        
        // Save the deletion record
        const deletionRecord = {
          id: `deleted_ingredient_${normalizedName}`,
          type: 'deleted_ingredient',
          name: normalizedName,
          deletedAt: new Date().toISOString()
        };
        await storage.create(deletionRecord);
      }
      
      showToast(`${name} deleted`, 'success');
      navigateTo('ingredients');
    }

    function addIngredientToInventoryDirect(ingredientName) {
      const knowledge = getIngredientKnowledge(ingredientName);
      state.prefillInventoryItem = {
        name: ingredientName,
        category: knowledge?.category,
        defaultExpirationDays: knowledge?.defaultExpirationDays,
        image_url: knowledge?.image_url || getIngredientImage(ingredientName)
      };
      showAddInventoryModal();
    }

    function showAddPairingModal(ingredientName) {
      const allIngredients = new Set();
      
      // From inventory
      state.inventory.forEach(item => allIngredients.add(item.name.toLowerCase()));
      
      // From ingredient knowledge
      (state.ingredientKnowledge || []).forEach(ing => allIngredients.add(ing.name.toLowerCase()));
      
      // From INGREDIENT_IMAGES
      Object.keys(INGREDIENT_IMAGES).forEach(name => allIngredients.add(name));
      
      const sortedIngredients = Array.from(allIngredients).sort();
      const capitalize = (str) => str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      
      openModal(`
        <div style="color: ${CONFIG.text_color};">
          <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">🧂 Add Pairing</h2>
          
          <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Search or select ingredient:</label>
            <input type="text" id="pairingSearch" placeholder="Type to search..."
              oninput="filterPairingOptions(this.value)"
              style="width: 100%; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; font-size: 16px; background: ${CONFIG.background_color}; color: ${CONFIG.text_color}; box-sizing: border-box; margin-bottom: 8px;" />
            
            <div id="pairingOptions" style="max-height: 200px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;">
              ${sortedIngredients.slice(0, 50).map(ing => `
                <div onclick="selectPairingOption('${esc(ingredientName)}', '${esc(ing)}')"
                  class="pairing-option"
                  style="padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);"
                  onmouseover="this.style.background='rgba(102,126,234,0.1)'"
                  onmouseout="this.style.background='transparent'">
                  ${esc(capitalize(ing))}

              `).join('')}

              <input type="text" id="customPairing" placeholder="e.g., lemon zest"
                style="flex: 1; padding: 12px; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; font-size: 16px; background: ${CONFIG.background_color}; color: ${CONFIG.text_color};" />
              <button onclick="addCustomPairing('${esc(ingredientName)}')"
                style="padding: 12px 20px; background: ${CONFIG.primary_action_color}; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">
                Add
              </button>
            </div>
          </div>
          
          <button onclick="closeModal()" 
            style="width: 100%; padding: 12px; background: ${CONFIG.background_color}; color: ${CONFIG.text_color}; border: none; border-radius: 8px; cursor: pointer;">
            Cancel
          </button>
        </div>
      `);
    }

    function filterPairingOptions(searchTerm) {
      const allIngredients = new Set();
      state.inventory.forEach(item => allIngredients.add(item.name.toLowerCase()));
      (state.ingredientKnowledge || []).forEach(ing => allIngredients.add(ing.name.toLowerCase()));
      Object.keys(INGREDIENT_IMAGES).forEach(name => allIngredients.add(name));
      
      const capitalize = (str) => str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      const filtered = Array.from(allIngredients)
        .filter(ing => ing.includes(searchTerm.toLowerCase()))
        .sort()
        .slice(0, 50);
      
      const container = document.getElementById('pairingOptions');
      if (container) {
        container.innerHTML = filtered.map(ing => `
          <div onclick="selectPairingOption('${state.selectedIngredientId}', '${esc(ing)}')"
            class="pairing-option"
            style="padding: 10px 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);"
            onmouseover="this.style.background='rgba(102,126,234,0.1)'"
            onmouseout="this.style.background='transparent'">
            ${esc(capitalize(ing))}
          </div>
        `).join('');
      }
    }

    async function selectPairingOption(ingredientName, pairing) {
      await savePairing(ingredientName, pairing);
      closeModal();

      const input = document.getElementById('customPairing');
      if (input && input.value.trim()) {
        await savePairing(ingredientName, input.value.trim());
        closeModal();
      }
    }

  async function saveFreezingInfo() {
      const ingredientName = document.getElementById('freezeIngName').value;
      const freezableVal = document.querySelector('input[name="freezable"]:checked')?.value;
      
      let knowledge = getIngredientKnowledge(ingredientName);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(ingredientName);
      }
      
      knowledge.freezable = freezableVal === 'yes' ? true : freezableVal === 'no' ? false : null;
      knowledge.freezingInfo = {
        blanch: document.getElementById('freezeBlanch').value.trim(),
        duration: document.getElementById('freezeDuration').value.trim(),
        defrostMethod: document.getElementById('freezeDefrostMethod').value.trim(),
        defrostTime: document.getElementById('freezeDefrostTime').value.trim(),
        afterDefrost: document.getElementById('freezeAfterDefrost').value.trim(),
        instructions: document.getElementById('freezeInstructions').value.trim()
      };
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Freezing info saved!', 'success');
      render();
    }

    async function deleteIngredientKnowledgeFull(ingredientName) {
      const knowledge = getIngredientKnowledge(ingredientName);
      if (knowledge) {
        await storage.delete(knowledge);
        state.ingredientKnowledge = state.ingredientKnowledge.filter(k => k.name.toLowerCase() !== ingredientName.toLowerCase());
      }
      state.pantryTab = 'ingredients';
      navigateTo('inventory');
      showToast('Ingredient deleted', 'success');
    }

      const displayName = ingredientName.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

  async function submitClaudeForSection() {
      const question = document.getElementById('claudeSectionQuestion').value;
      const btn = document.getElementById('askClaudeSectionBtn');
      
      btn.disabled = true;
      btn.innerHTML = '⏳ Asking Claude...';
      
      try {
       const response = await fetch(CHEF_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemPrompt: 'You give extremely brief answers. Maximum 20 words. No explanations. No markdown. Just facts.',
            messages: [{ role: 'user', content: question }]
          })
        });
        
        const data = await response.json();
        const responseText = data.content?.[0]?.text || data.error || 'No response received';
        
      document.getElementById('claudeSectionResponse').style.display = 'block';
        
        // Format the response nicely
        let formattedResponse = responseText
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>')
          .replace(/^[-•]\s*/gm, '• ')
          .replace(/(\d+)\.\s+/g, '<strong>$1.</strong> ');
        
        document.getElementById('claudeSectionResponseText').innerHTML = `
          <div style="font-size: 14px; line-height: 1.5; color: ${CONFIG.text_color};">
            ${formattedResponse}
          </div>
        `;
        document.getElementById('claudeSectionButtons').style.display = 'none';
        document.getElementById('claudeSectionSaveButtons').style.display = 'flex';
        
        // Store the response for saving
        state.claudeSectionResponse = responseText;
        
      } catch (error) {
        console.error('Claude API error:', error);
        showError('Failed to get response from Claude');
        btn.disabled = false;
        btn.innerHTML = '🤖 Ask Claude';
      }
    }

  async function saveClaudeResponseToSection() {
      const ingredientName = document.getElementById('claudeSectionName')?.value;
      const section = document.getElementById('claudeSectionType')?.value;
      const response = state.claudeSectionResponse;
      
      console.log('Saving Claude response:', { ingredientName, section, response });
      
      if (!response) {
        showError('No response to save');
        return;
      }
      
      if (!ingredientName || !section) {
        showError('Missing ingredient or section info');
        return;
      }
      
      let knowledge = getIngredientKnowledge(ingredientName);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(ingredientName);
      }
      
      switch (section) {
        case 'cooking':
          // Parse cooking methods from response
          const methods = parseClaudeCookingMethods(response);
          knowledge.cookingMethods = [...(knowledge.cookingMethods || []), ...methods];
          break;
          
      case 'techniques':
          // Parse structured technique response
          knowledge.techniques = knowledge.techniques || [];
          
          const resultMatch = response.match(/RESULT:\s*(.+?)(?=METHOD:|$)/is);
          const methodMatch = response.match(/METHOD:\s*(.+?)(?=STEPS:|$)/is);
          const stepsMatch = response.match(/STEPS:\s*(.+)/is);
          
          knowledge.techniques.push({
            result: resultMatch ? resultMatch[1].trim() : 'Claude Suggestion',
            method: methodMatch ? methodMatch[1].trim() : 'Technique',
            steps: stepsMatch ? stepsMatch[1].trim() : response
          });
          break;
          
        case 'pairings':
          // Parse pairings from response (comma separated)
          const pairings = response.split(/[,\n]/)
            .map(p => p.trim().toLowerCase().replace(/[•\-\*]/g, '').trim())
            .filter(p => p && p.length > 1 && p.length < 50);
          knowledge.pairings = [...new Set([...(knowledge.pairings || []), ...pairings])];
          break;
          
      case 'freezing':
          // Parse structured freezing response
          const freezableMatch = response.match(/FREEZABLE:\s*(yes|no)/i);
          const blanchMatch = response.match(/BLANCH:\s*(.+?)(?=FREEZE DURATION:|$)/is);
          const durationMatch = response.match(/FREEZE DURATION:\s*(.+?)(?=DEFROST METHOD:|$)/is);
          const defrostMethodMatch = response.match(/DEFROST METHOD:\s*(.+?)(?=DEFROST TIME:|$)/is);
          const defrostTimeMatch = response.match(/DEFROST TIME:\s*(.+?)(?=AFTER DEFROST:|$)/is);
          const afterDefrostMatch = response.match(/AFTER DEFROST:\s*(.+)/is);
          
          knowledge.freezable = freezableMatch ? freezableMatch[1].toLowerCase() === 'yes' : response.toLowerCase().includes('yes');
          knowledge.freezingInfo = {
            blanch: blanchMatch ? blanchMatch[1].trim() : '',
            duration: durationMatch ? durationMatch[1].trim() : '',
            defrostMethod: defrostMethodMatch ? defrostMethodMatch[1].trim() : '',
            defrostTime: defrostTimeMatch ? defrostTimeMatch[1].trim() : '',
            afterDefrost: afterDefrostMatch ? afterDefrostMatch[1].trim() : '',
            instructions: ''
          };
          break;
          
        case 'notes':
          // Add as note
          knowledge.notes = knowledge.notes || [];
          knowledge.notes.push(response);
          break;
      }
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Saved to ingredient!', 'success');
      render();
    }

   function parseClaudeCookingMethods(response) {
      const methods = [];
      const lines = response.split(/[\n,]/).filter(l => l.trim());
      
      lines.forEach(line => {
        // Match patterns like "Air Fry: 400°F, 15 min" or "Roast - 425F - 20 minutes"
        const methodMatch = line.match(/(?:air\s*fry|roast|bake|grill|saut[ée]|steam|boil|pan[\s-]*fry|broil|braise|poach|simmer)/i);
        const tempMatch = line.match(/(\d+)\s*°?\s*[FC]/i);
        const timeMatch = line.match(/(\d+(?:\s*-\s*\d+)?)\s*(?:min(?:ute)?s?|hour?s?|hr)/i);
        
        if (methodMatch) {
          methods.push({
            method: methodMatch[0].replace(/[\s-]+/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' '),
            temp: tempMatch ? tempMatch[0].replace(/\s/g, '') : '',
            time: timeMatch ? timeMatch[0] : '',
            notes: ''
          });
        }
      });
      
      // If no structured methods found, try to parse the whole response
      if (methods.length === 0 && response.trim()) {
        // Try splitting by common delimiters
        const parts = response.split(/[;.]/).filter(p => p.trim());
        parts.forEach(part => {
          const methodMatch = part.match(/(?:air\s*fry|roast|bake|grill|saut[ée]|steam|boil|pan[\s-]*fry|broil|braise|poach|simmer)/i);
          if (methodMatch) {
            const tempMatch = part.match(/(\d+)\s*°?\s*[FC]/i);
            const timeMatch = part.match(/(\d+(?:\s*-\s*\d+)?)\s*(?:min(?:ute)?s?|hour?s?|hr)/i);
            methods.push({
              method: methodMatch[0].charAt(0).toUpperCase() + methodMatch[0].slice(1).toLowerCase(),
              temp: tempMatch ? tempMatch[0] : '',
              time: timeMatch ? timeMatch[0] : '',
              notes: ''
            });
          }
        });
      }
      
      return methods;
    }
   
    async function saveIngredientKnowledge(knowledge) {
      const existing = state.ingredientKnowledge.find(k => k.id === knowledge.id);
      
      if (existing) {
        Object.assign(existing, knowledge);
        await storage.update(knowledge);
      } else {
        state.ingredientKnowledge.push(knowledge);
        await storage.create(knowledge);
      }
    }

      const knowledge = getIngredientKnowledge(name);
      if (!knowledge || !knowledge.techniques || !knowledge.techniques[idx]) return;
      
      const tech = knowledge.techniques[idx];
      
      openModal(`
        <div style="color: ${CONFIG.text_color};">
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 16px;">
            <span style="font-size: 1.5rem;">🎯</span>
            <h2 style="font-size: 20px; font-weight: 700; margin: 0;">${esc(tech.result)}</h2>
          </div>
          
          <div style="margin-bottom: 16px;">
            <div style="color: ${CONFIG.primary_action_color}; font-weight: 600; font-size: 15px; margin-bottom: 8px;">
              ${esc(tech.method)}
            </div>
            <div style="color: ${CONFIG.text_color}; font-size: 14px; line-height: 1.7; white-space: pre-line; background: ${CONFIG.background_color}; padding: 12px; border-radius: 8px;">
              ${esc(tech.steps)}
            </div>
          </div>
          
          <div style="display: flex; gap: 8px;">
            <button onclick="closeModal()" 
              style="flex: 1; padding: 12px; background: ${CONFIG.background_color}; color: ${CONFIG.text_color}; border: none; border-radius: 8px; cursor: pointer;">
              Close
            </button>
            <button onclick="closeModal(); deleteTechnique('${esc(name)}', ${idx})"
              style="padding: 12px 20px; background: rgba(239,68,68,0.1); color: #ef4444; border: none; border-radius: 8px; cursor: pointer;">
              🗑️ Delete
            </button>
          </div>
        </div>
      `);
    }

    function addPairing(name) {
      const pairing = prompt('Enter an ingredient that pairs well with ' + name + ':');
      if (pairing && pairing.trim()) {
        savePairing(name, pairing.trim());
      }
    }

    async function savePairing(name, pairing) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.pairings = knowledge.pairings || [];
      if (!knowledge.pairings.includes(pairing.toLowerCase())) {
        knowledge.pairings.push(pairing.toLowerCase());
        await saveIngredientKnowledge(knowledge);
        showToast('Pairing added!', 'success');
        render();
      }
    }

    async function deletePairing(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.pairings) {
        knowledge.pairings.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }

    function addIngredientNote(name) {
      const note = prompt('Add a note about ' + name + ':');
      if (note && note.trim()) {
        saveIngredientNote(name, note.trim());
      }
    }

    async function saveIngredientNote(name, note) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      
      knowledge.notes = knowledge.notes || [];
      knowledge.notes.push(note);
      await saveIngredientKnowledge(knowledge);
      showToast('Note added!', 'success');
      render();
    }
   function editIngredientNote(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (!knowledge || !knowledge.notes || !knowledge.notes[index]) return;
      
      const note = knowledge.notes[index];
      
      // Extract title and content
      const lines = note.split('\n');
      let noteTitle = lines[0].replace(/^📌\s*/, '').trim();
      const noteContent = lines.slice(1).join('\n').trim();
      
      openModal(`
        <div style="color: #1a1a2e; max-height: 80vh; overflow-y: auto;">
          <h2 class="text-xl font-bold mb-4">✏️ Edit Note</h2>
          
          <div class="mb-4">
            <label class="block mb-2 font-semibold">Title:</label>
            <input type="text" id="editNoteTitle" class="w-full px-3 py-2 border rounded"
                   value="${esc(noteTitle)}" placeholder="Note title" />
          </div>
          
          <div class="mb-4">
            <label class="block mb-2 font-semibold">Content:</label>
            <textarea id="editNoteContent" class="w-full px-3 py-2 border rounded" rows="10"
                      placeholder="Note content...">${esc(noteContent)}</textarea>
          </div>
          
          <input type="hidden" id="editNoteIngName" value="${esc(name)}" />
          <input type="hidden" id="editNoteIndex" value="${index}" />
          
          <div class="flex gap-2 justify-end">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
              Cancel
            </button>
            <button onclick="saveEditedNote()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
              Save
            </button>
          </div>
        </div>
      `);
    }

    async function saveEditedNote() {
      const name = document.getElementById('editNoteIngName').value;
      const index = parseInt(document.getElementById('editNoteIndex').value);
      const title = document.getElementById('editNoteTitle').value.trim();
      const content = document.getElementById('editNoteContent').value.trim();
      
      if (!title) {
        showError('Please enter a title');
        return;
      }
      
      const knowledge = getIngredientKnowledge(name);
      if (!knowledge || !knowledge.notes) return;
      
      // Update the note
      knowledge.notes[index] = `📌 ${title}\n\n${content}`;
      
      await saveIngredientKnowledge(knowledge);
      closeModal();
      showToast('Note updated!', 'success');
      render();
    }

    async function deleteIngredientNote(name, index) {
      const knowledge = getIngredientKnowledge(name);
      if (knowledge && knowledge.notes) {
        knowledge.notes.splice(index, 1);
        await saveIngredientKnowledge(knowledge);
        render();
      }
    }

    function toggleIngredientFavorite(name) {
      let knowledge = getIngredientKnowledge(name);
      if (!knowledge) {
        knowledge = createDefaultIngredientKnowledge(name);
      }
      knowledge.favorite = !knowledge.favorite;
      saveIngredientKnowledge(knowledge);
      render();
    }

    function askClaudeAboutIngredient(name) {
      // Open chat with pre-filled question
      state.chefChatOpen = true;
      renderChefChat();
      
      setTimeout(() => {
        const input = document.getElementById('chefChatInput');
        if (input) {
          input.value = `Tell me about ${name}: cooking times for different methods, storage tips, what it pairs well with, and any freezing instructions.`;
          input.focus();
        }
      }, 100);
    }

    // ===== INITIALIZATION =====
    async function init() {
      await storage.init(dataHandler);
      // Check for expiring items after data loads
    setTimeout(() => {
      checkExpirationNotifications();
    }, 2000);
      setupKeyboardShortcuts();
      render();
      
      // Show welcome message on first load
      if (state.recipes.length === 0) {
        setTimeout(() => {
          showToast('Welcome! Press ⚙️ to view keyboard shortcuts', 'info');
        }, 500);
      }
    }

    init();
  </script>
</body>
</html>

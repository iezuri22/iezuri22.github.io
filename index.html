   // Compress image before upload
    async function compressImage(file, maxWidth = 800, quality = 0.7) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // Scale down if wider than maxWidth
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              (blob) => {
                // Create a new file from the blob
                const compressedFile = new File([blob], file.name, {
                  type: 'image/jpeg',
                  lastModified: Date.now(),
                });
                console.log(`Compressed: ${(file.size/1024).toFixed(0)}KB → ${(compressedFile.size/1024).toFixed(0)}KB`);
                resolve(compressedFile);
              },
              'image/jpeg',
              quality
            );
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function handleReceiptUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      receiptScanState.isScanning = true;
      receiptScanState.showModal = true;
      receiptScanState.extractedText = '';
      receiptScanState.detectedTotal = null;
      render();

      try {
        // Compress and upload the image

        const compressedFile = await compressImage(file, 1200, 0.8);
        
        showToast('Uploading receipt...', 'info');
        const imageUrl = await uploadPhoto(compressedFile);
        
        if (!imageUrl) {
          receiptScanState.isScanning = false;
          render();
          return;
        }
        
        receiptScanState.imageUrl = imageUrl;
        render();

        // Run OCR
        showToast('Reading receipt...', 'info');
        const result = await Tesseract.recognize(imageUrl, 'eng', {
          logger: m => {
            if (m.status === 'recognizing text') {
              const pct = Math.round(m.progress * 100);
              document.getElementById('ocrProgress')?.style.setProperty('width', pct + '%');
            }
          }
        });

        receiptScanState.extractedText = result.data.text;
        receiptScanState.detectedTotal = extractTotalFromReceipt(result.data.text);
        receiptScanState.isScanning = false;
        
        showToast('Receipt scanned!', 'success');
        render();

      } catch (e) {
        console.error('Receipt scan error:', e);
        showError('Failed to scan receipt');
        receiptScanState.isScanning = false;
        render();
      }
      
      event.target.value = '';
    }

function extractTotalFromReceipt(text) {
      // Look for dollar sign followed by amount (most reliable)
      const dollarAmounts = text.match(/\$\s*(\d{1,3}(?:,?\d{3})*\.\d{2})/g) || [];
      const parsedDollarAmounts = dollarAmounts.map(a => parseFloat(a.replace(/[$,\s]/g, ''))).filter(n => n > 0 && n < 5000);
      
      // Common patterns for totals on receipts
      const patterns = [
        /total[:\s]*\$?\s*(\d{1,3}(?:,?\d{3})*\.?\d{0,2})/i,
        /grand\s*total[:\s]*\$?\s*(\d{1,3}(?:,?\d{3})*\.?\d{0,2})/i,
        /amount\s*due[:\s]*\$?\s*(\d{1,3}(?:,?\d{3})*\.?\d{0,2})/i,
        /balance\s*due[:\s]*\$?\s*(\d{1,3}(?:,?\d{3})*\.?\d{0,2})/i,
        /you\s*paid[:\s]*\$?\s*(\d{1,3}(?:,?\d{3})*\.?\d{0,2})/i,
      ];

      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          const amount = parseFloat(match[1].replace(/,/g, ''));
          if (amount > 0 && amount < 5000) {
            return amount;
          }
        }
      }

      // If we found dollar amounts, prefer the one that appears most frequently
      // or is in the typical grocery range ($20-$500)
      if (parsedDollarAmounts.length > 0) {
        // Look for amounts in typical grocery range first
        const typicalRange = parsedDollarAmounts.filter(n => n >= 20 && n <= 500);
        if (typicalRange.length > 0) {
          return Math.max(...typicalRange);
        }
        // Otherwise return the largest reasonable amount
        return Math.max(...parsedDollarAmounts);
      }

      return null;
    }

    function getExpirationDays(itemName, category) {
      const lowerName = itemName.toLowerCase();
      
      // Check user's custom defaults first
      if (state.expirationDefaults[lowerName]) {
        return state.expirationDefaults[lowerName];
      }
      
      // Check AI defaults by item name
      for (const [key, days] of Object.entries(DEFAULT_EXPIRATION_DAYS)) {
        if (!key.startsWith('_') && lowerName.includes(key)) {
          return days;
        }
      }
      
      // Fallback to category default
      return DEFAULT_EXPIRATION_DAYS['_' + category] || 7;
    }

    function suggestExpirationDate(itemName, category, purchaseDate) {
      const days = getExpirationDays(itemName, category);
      const date = new Date(purchaseDate || new Date());
      date.setDate(date.getDate() + days);
      return date.toISOString().split('T')[0];
    }

    function getExpirationStatus(item) {
      if (item.isFrozen) return 'frozen';
      if (!item.expirationDate) return 'unknown';
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expDate = new Date(item.expirationDate);
      const daysUntil = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24));
      
      if (daysUntil < 0) return 'expired';
      if (daysUntil <= 2) return 'expiring-soon';
      if (daysUntil <= 5) return 'expiring';
      return 'fresh';
    }

        case 'fresh': return '#22c55e'; // green

  function extractItemsFromReceipt(text) {
      const lines = text.split('\n');
      const items = [];
      const seenItems = new Set();
      
      // Skip words that indicate non-item lines
      const skipPatterns = /^(TOTAL|SUBTOTAL|TAX|BALANCE|CHANGE|CASH|CREDIT|DEBIT|VISA|MASTERCARD|THANK|SALE|TRANSACTION|STORE|OPEN|CLOSE|TEL|PHONE|ADDRESS|DATE|TIME|RECEIPT|CUSTOMER|CARD|PAYMENT|APPROVED|SIGNATURE|PIN|VERIFIED|SAVINGS|DISCOUNT|COUPON|MEMBER|LOYALTY|REWARDS)/i;
      
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.length < 5) continue;
        
        // Skip non-item lines
        if (skipPatterns.test(trimmed)) continue;
        
        // Look for price pattern at end of line: numbers like 1.99, 12.50, etc.
        const priceMatch = trimmed.match(/(\d{1,3}\.\d{2})\s*$/);
        
        if (priceMatch) {
          const price = parseFloat(priceMatch[1]);
          
          // Skip if price is too high (likely a total) or too low
          if (price < 0.25 || price > 50) continue;
          
          // Extract item name (everything before the price)
          let name = trimmed.slice(0, trimmed.lastIndexOf(priceMatch[1])).trim();
          
          // Clean up the name
          name = name
            .replace(/^[\d\s]+/, '') // Remove leading numbers/spaces
            .replace(/[|\\\/\[\]{}]+/g, '') // Remove special chars
            .replace(/\s+/g, ' ') // Normalize spaces
            .trim();
          
          // Skip if name is too short or looks like garbage
          if (name.length < 3) continue;
          if (!/[a-zA-Z]{2,}/.test(name)) continue; // Must have at least 2 letters together
          
          // Format the name nicely
          name = formatItemName(name);
          
          // Skip duplicates
          const key = name.toLowerCase();
          if (seenItems.has(key)) continue;
          seenItems.add(key);
          
        // Store both raw and formatted name
          const rawName = name;
          const formattedName = formatItemName(name, rawName);
          
          items.push({
            name: formattedName,
            rawText: rawName,
            price: price,
            quantity: 1,
            category: guessCategory(formattedName)
          });
        }
      }
      
      // Sort by price descending (most expensive items first, usually more important)
      items.sort((a, b) => b.price - a.price);
      
      // Limit to top 20 items
      return items.slice(0, 20);
    }

    function getSimilarItems(searchTerm) {
      // Get items that are similar to the search term
      const term = searchTerm.toLowerCase();
      const suggestions = new Set();
      
      // Check inventory for similar items
      const inventory = getInventoryItems();
      inventory.forEach(item => {
        if (item.name.toLowerCase().includes(term) || 
            term.includes(item.name.toLowerCase().split(' ')[0])) {
          suggestions.add(item.name);
        }
      });
      
      // Check ITEM_MAPPINGS for similar items
      ITEM_MAPPINGS.forEach(mapping => {
        const nameLower = mapping.name.toLowerCase();
        if (nameLower.includes(term) || term.split(' ').some(word => nameLower.includes(word))) {
          suggestions.add(mapping.name);
        }
      });
      
      // Check learned mappings for similar corrected names
      Object.values(state.receiptMappings).forEach(correctedName => {
        if (correctedName.toLowerCase().includes(term) ||
            term.split(' ').some(word => correctedName.toLowerCase().includes(word))) {
          suggestions.add(correctedName);
        }
      });
      
      // Add common variations based on the term
      const variations = getCommonVariations(term);
      variations.forEach(v => suggestions.add(v));
      
      return Array.from(suggestions).slice(0, 10);
    }

 function formatItemName(name, rawText = null) {
      // First check user's learned mappings
      const learned = getLearnedMapping(rawText || name);
      if (learned) {
        return learned;
      }
      
      // Try to match against known patterns (only for abbreviated items)
      for (const mapping of ITEM_MAPPINGS) {
        for (const pattern of mapping.patterns) {
          if (pattern.test(name)) {
            return mapping.name;
          }
        }
      }
      
      // Fallback: clean up abbreviations but keep the descriptive name
      return name
        .toLowerCase()
        .replace(/\b(bnls|sknls|skns|nat|natl|r-|wt|t\b)\b/gi, '') // Remove receipt abbreviations
        .replace(/\borg\b/gi, 'Organic') // Expand common abbreviations
        .replace(/\blb\b/gi, '') // Remove weight indicators
        .replace(/\boz\b/gi, '')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function guessCategory(name) {
      // First check against known mappings
      for (const mapping of ITEM_MAPPINGS) {
        for (const pattern of mapping.patterns) {
          if (pattern.test(name)) {
            return mapping.category;
          }
        }
      }
      
      // Fallback to keyword matching
      const lower = name.toLowerCase();
      
      if (lower.match(/chicken|beef|pork|salmon|fish|shrimp|turkey|sausage|meat|steak|bacon/)) return 'Meat & Seafood';
      if (lower.match(/milk|cheese|yogurt|butter|cream|egg/)) return 'Dairy & Eggs';
      if (lower.match(/bread|bagel|tortilla|roll|bun/)) return 'Bakery';
      if (lower.match(/apple|banana|orange|berry|fruit|grape|melon|mango/)) return 'Produce';
      if (lower.match(/lettuce|spinach|kale|carrot|broccoli|tomato|onion|potato|vegetable|greens|pepper|cucumber|squash|zucchini/)) return 'Produce';
      if (lower.match(/frozen|ice cream/)) return 'Frozen';
      if (lower.match(/soup|sauce|pasta|rice|bean|can|oil/)) return 'Pantry';
      if (lower.match(/chip|snack|cookie|cracker/)) return 'Snacks';
      if (lower.match(/water|juice|soda|drink|coffee|tea/)) return 'Beverages';
      
      return 'Other';
    }
    function guessCategory(name) {
      const lower = name.toLowerCase();

      if (lower.match(/milk|cheese|yogurt|butter|cream|egg/)) return 'Dairy & Eggs';
      if (lower.match(/bread|bagel|tortilla|roll/)) return 'Bakery';
      if (lower.match(/apple|banana|orange|berry|fruit|grape|melon/)) return 'Produce';
      if (lower.match(/lettuce|spinach|kale|carrot|broccoli|tomato|onion|potato|vegetable|greens|pepper|cucumber|squash|zucchini/)) return 'Produce';
      if (lower.match(/frozen|ice cream/)) return 'Frozen';
      if (lower.match(/soup|sauce|pasta|rice|bean|can/)) return 'Pantry';
      if (lower.match(/chip|snack|cookie|cracker/)) return 'Snacks';
      if (lower.match(/water|juice|soda|drink|coffee|tea/)) return 'Beverages';
      
      return 'Other';
    }

 function renderInventory() {

    async function useInventoryItem(id) {
      const item = state.inventory.find(i => i.id === id);

        // Move to history
        const historyItem = {
          id: `history_${Date.now()}_${Math.random().toString(36).slice(2)}`,
          name: item.name,
          category: item.category,
          price: item.price,
          quantity: item.quantity,
          unit: item.unit,
          image_url: item.image_url,
          purchaseDate: item.purchaseDate,
          usedDate: new Date().toISOString().split('T')[0],
          originalId: item.id
        };
        
        await storage.create(historyItem);
        await deleteInventoryItem(id);
        showToast('Item moved to history', 'success');
      }

    async function confirmItemEdit(index) {
      const input = document.getElementById(`editItemName_${index}`);
      const checkbox = document.getElementById(`receiptItem_${index}`);
      const rememberCheckbox = document.getElementById(`rememberMapping_${index}`);
      
      if (!input || !checkbox) return;
      
      const newName = input.value.trim();
      const rawText = checkbox.dataset.raw || window._receiptItems?.[index]?.rawText;
      
      if (!newName) {
        showError('Please enter an item name');
        return;
      }
      
      // Update the item
      if (window._receiptItems?.[index]) {
        window._receiptItems[index].name = newName;
        window._receiptItems[index].category = guessCategory(newName);
      }
      
      // Update checkbox data
      checkbox.dataset.name = newName;
      checkbox.dataset.category = guessCategory(newName);
      
      // Save mapping if "Remember" is checked
      if (rememberCheckbox?.checked && rawText && rawText !== newName) {
        await saveReceiptMapping(rawText, newName);
        showToast(`Learned: "${rawText.slice(0, 20)}..." → "${newName}"`, 'success');
      }
      
      // Restore normal display
      const row = document.getElementById(`receiptItemRow_${index}`);
      if (row) {
        row.innerHTML = `
          <input type="checkbox" checked 
            id="receiptItem_${index}"
            data-name="${esc(newName)}"
            data-raw="${esc(rawText || newName)}"
            data-price="${window._receiptItems?.[index]?.price || 0}"
            data-category="${guessCategory(newName)}" />

    function updateSuggestedExpiration() {
      const name = document.getElementById('inventoryName')?.value || '';
      const category = document.getElementById('inventoryCategory')?.value || 'Other';
      const purchaseDate = document.getElementById('inventoryPurchaseDate')?.value;
      const isFrozen = document.getElementById('inventoryFrozen')?.checked;
      const expirationInput = document.getElementById('inventoryExpiration');
      const suggestionDiv = document.getElementById('expirationSuggestion');
      
      if (!expirationInput || !suggestionDiv) return;
      
      if (isFrozen) {
        suggestionDiv.textContent = '❄️ Frozen items don\'t expire';
        expirationInput.value = '';
        expirationInput.disabled = true;
      } else {
        expirationInput.disabled = false;
        const days = getExpirationDays(name || category, category);
        const suggestedDate = suggestExpirationDate(name || category, category, purchaseDate);
        
        if (!expirationInput.value) {
          expirationInput.value = suggestedDate;
        }
        
        suggestionDiv.textContent = `AI suggests ${days} days for ${name || category}`;
      }
    }

    async function uploadPhoto(file) {
      const { data: { user } } = await window.supabaseClient.auth.getUser();
      if (!user) {
        showError('Please log in to upload photos');
        return null;
      }

      if (!file.type.startsWith('image/')) {
        showError('Please select an image file');
        return null;
      }

      if (file.size > 10 * 1024 * 1024) {
        showError('Image must be less than 10MB');
        return null;
      }

      const fileExt = file.name.split('.').pop();
      const fileName = `${user.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${fileExt}`;

      showToast('Uploading photo...', 'info');

      try {
        const { data, error } = await window.supabaseClient.storage
          .from('meal-photos')
          .upload(fileName, file, {
            cacheControl: '3600',
            upsert: false
          });

        if (error) {
          console.error('Upload error:', error);
          showError('Failed to upload photo: ' + error.message);
          return null;
        }

        const { data: urlData } = window.supabaseClient.storage
          .from('meal-photos')
          .getPublicUrl(fileName);

        showToast('Photo uploaded!', 'success');
        return urlData.publicUrl;
      } catch (e) {
        console.error('Upload exception:', e);
        showError('Failed to upload photo');
        return null;
      }
    }

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getMonday(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

   function getWeekDates(startDate) {
  const dates = [];
  const start = new Date(startDate + 'T00:00:00');
  
  // Get exactly 7 days starting from startDate (Sunday)
  for (let i = 0; i < 7; i++) {
    const date = new Date(start);
    date.setDate(start.getDate() + i);
    dates.push(date.toISOString().split('T')[0]);
  }
  
  return dates;
}

   async function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Please enter email and password');
        return;
      }

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        showError('Login failed: ' + error.message);
        return;
      }

      // Migrate localStorage data to Supabase
      await migrateLocalStorageToSupabase();
      
      await storage.loadData();

    async function migrateLocalStorageToSupabase() {
      const STORAGE_KEY = 'meal_planner_data_v1';
      const localData = localStorage.getItem(STORAGE_KEY);
      
      if (!localData) {
        console.log('No local data to migrate');
        return;
      }

      try {
        const items = JSON.parse(localData);
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        
        if (!user || items.length === 0) return;

        showToast('Migrating your data to cloud...', 'info');

        // Upload each item to Supabase
        for (const item of items) {
          await window.supabaseClient
            .from('meal_planner_data')
            .insert({
              id: item.id,
              user_id: user.id,
              data: item
            });
        }

        showToast(`Migrated ${items.length} items to cloud!`, 'success');
        
        // Clear localStorage after successful migration
        localStorage.removeItem(STORAGE_KEY);
        console.log('Migration complete, localStorage cleared');
        
      } catch (e) {
        console.error('Migration error:', e);
        showError('Failed to migrate data. Please try again.');
      }
    }

          e.preventDefault();

          e.preventDefault();
          showImportModal();

        // Escape: Close modal or go back

          if (modal.style.display === 'flex') {
            closeModal();
          } else if (state.currentView !== 'home') {
            navigateTo('home');

        }

        // H: Go home
        if (e.key === 'h' && state.currentView !== 'home') {
          navigateTo('home');
        }

        // R: Go to recipes
        if (e.key === 'r' && state.currentView !== 'recipes') {
          navigateTo('recipes');

        // W: Go to weekly plan
        if (e.key === 'w' && state.currentView !== 'weekly-plan') {

        if (e.key === 'g' && state.currentView !== 'grocery-list') {

    function processBulkIngredients() {
      const textarea = document.getElementById('bulkIngredientInput');

    function parseIngredientLine(line) {
      line = line.trim();
      
      // Remove leading bullet points or dashes
      line = line.replace(/^[•\-\*]\s*/, '');
      
      // Common units to look for
      const units = [
        'lb', 'lbs', 'pound', 'pounds',
        'oz', 'ounce', 'ounces',
        'g', 'gram', 'grams',
        'kg', 'kilogram', 'kilograms',
        'tsp', 'teaspoon', 'teaspoons',
        'tbsp', 'tablespoon', 'tablespoons',
        'cup', 'cups',
        'ml', 'milliliter', 'milliliters',
        'l', 'liter', 'liters',
        'can', 'cans',
        'piece', 'pieces',
        'slice', 'slices',
        'clove', 'cloves',
        'inch', 'inches'
      ];

      // Try to match: quantity unit name
      // Examples: "1 lb Boneless lamb", "2 Tbsp Fresh ginger", "1/2 tsp Cayenne"
      const regex = /^([\d\/\.\s]+)?\s*([a-zA-Z\-]+)?\s*(.*)$/;
      const match = line.match(regex);

      if (!match) {
        return { qty: '', unit: '', name: capitalizeWords(line), group: 'Other' };
      }

      let [, quantity, possibleUnit, rest] = match;
      quantity = (quantity || '').trim();
      possibleUnit = (possibleUnit || '').trim();
      rest = (rest || '').trim();

      let unit = '';
      let name = '';

      // Check if possibleUnit is actually a unit
      if (possibleUnit && units.includes(possibleUnit.toLowerCase())) {
        unit = possibleUnit.toLowerCase();
        name = rest;
      } else if (possibleUnit) {
        // It's not a unit, it's part of the name
        name = rest ? possibleUnit + ' ' + rest : possibleUnit;
      } else {
        name = rest;
      }

      // Clean up name - remove parenthetical notes like (Optional), (from a 2-inch piece)
      const cleanName = name.replace(/\([^)]*\)$/g, '').trim();
      
      // Remove trailing commas and clean up
      const finalName = cleanName.replace(/,\s*$/, '').trim();

      // Auto-detect ingredient group
      const group = detectIngredientGroup(finalName);

      return {
        qty: quantity,
        unit: unit,
        name: capitalizeWords(finalName),
        group: group
      };
    }

    function capitalizeWords(str) {
      if (!str) return '';
      return str.split(' ').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      ).join(' ');
    }

    function detectIngredientGroup(name) {
      const nameLower = name.toLowerCase();
      
      // Comprehensive keyword matching with priority order (most specific first)
      
      // Spices & Seasonings (check first - very specific)
      if (nameLower.match(/\b(salt|pepper|spice|cumin|coriander|turmeric|cayenne|paprika|cinnamon|nutmeg|clove|cardamom|bay leaf|bay leaves|thyme|rosemary|oregano|basil|sage|dill|tarragon|chive|mint|parsley|cilantro|masala|garam masala|curry powder|chili powder|red pepper flakes|garlic powder|onion powder|ginger powder|fennel seed|caraway|anise|saffron|vanilla|extract|seasoning|dried herbs?|ground spices?|whole spices?|peppercorn|kosher salt|sea salt|himalayan salt|black pepper|white pepper|cayenne pepper|chili flakes?|italian seasoning|herbs? de provence|five spice|chinese five spice|cajun|creole|taco seasoning|ranch|everything bagel)\b/)) {
        return 'Spices & Seasonings';
      }
      
      // Beef (specific cuts and types)
      if (nameLower.match(/\b(beef|steak|ground beef|chuck|brisket|ribeye|rib eye|sirloin|tenderloin|filet mignon|t-bone|porterhouse|new york strip|flank|skirt|hanger|tri-tip|short rib|oxtail|beef shank|stew meat|beef roast|prime rib|london broil|beef patty|beef patties|ground chuck|beef mince|corned beef|pastrami|beef jerky)\b/)) {
        return 'Beef';
      }
      
      // Poultry (all types)
      if (nameLower.match(/\b(chicken|turkey|duck|quail|cornish hen|poultry|breast|thigh|wing|drumstick|chicken breast|chicken thigh|turkey breast|ground chicken|ground turkey|chicken tenders|chicken cutlet|whole chicken|rotisserie chicken|chicken quarters?|duck breast|duck leg)\b/)) {
        return 'Poultry';
      }
      
      // Pork (all cuts and products)
      if (nameLower.match(/\b(pork|bacon|ham|sausage|prosciutto|pancetta|chorizo|salami|pepperoni|pork chop|pork loin|pork shoulder|pork belly|ground pork|pork ribs?|baby back ribs?|spare ribs?|pork tenderloin|pulled pork|pork roast|canadian bacon|breakfast sausage|italian sausage|bratwurst|hot dogs?|frankfurter|kielbasa|andouille)\b/)) {
        return 'Pork';
      }
      
      // Lamb & Goat (all cuts)
      if (nameLower.match(/\b(lamb|goat|mutton|lamb chop|lamb shank|lamb shoulder|leg of lamb|rack of lamb|ground lamb|lamb stew|lamb loin|goat meat|lamb ribs?)\b/)) {
        return 'Lamb & Goat';
      }
      
      // Seafood (comprehensive)
      if (nameLower.match(/\b(fish|salmon|tuna|shrimp|prawns?|crab|lobster|seafood|cod|tilapia|halibut|mahi|mahi-mahi|scallops?|clams?|mussels?|oysters?|anchovies|anchovy|sardines?|trout|bass|snapper|grouper|catfish|sole|flounder|haddock|swordfish|mackerel|herring|sea bass|seabass|shellfish|calamari|squid|octopus|crayfish|crawfish|caviar|roe|fish fillet|fish steak|smoked salmon|canned tuna|canned salmon|imitation crab)\b/)) {
        return 'Seafood';

    async function saveRecipeForm() {
      ensureRecipeForm();

      const title = (state.recipeForm.title || '').trim();
      const cat = (state.recipeForm.category || '').trim();
      const url = (state.recipeForm.recipe_url || '').trim();

      if (!title) return showError(state.recipeForm.isTip ? 'Tip Title is required.' : 'Recipe Title is required.');
      if (!cat) return showError('Category is required.');

      const rows = (state.recipeForm.ingredientsRows || [])
        .map(r => ({
          qty: (r.qty || '').trim(),
          unit: (r.unit || '').trim(),
          name: (r.name || '').trim(),
          group: r.group || 'Other'
        }))
        .filter(r => r.name); const payload = {
        ...state.recipeForm,
        title,
        category: cat,
        recipe_url: url,
        image_url: (state.recipeForm.image_url || '').trim(),
        tags: (state.recipeForm.tags || '').trim(),
        notes: (state.recipeForm.notes || '').trim(),
        instructions: (state.recipeForm.instructions || '').trim(),
        ingredientsRows: rows,
        sourceType: state.recipeForm.sourceType || 'user',
        isDraft: state.recipeForm.isDraft || false
      };

      try {
        if (payload.id) {
          await storage.update(payload);
        } else {
          payload.id = `recipe_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          await storage.create(payload);
        }
showToast(payload.isTip ? 'Tip saved!' : 'Recipe saved!', 'success');        closeRecipeEditor();
      } catch (e) {
        console.error(e);
        showError('Failed to save recipe.');
      }
    }

  function addToMealOptions(recipeId, category) {
      const recipe = getRecipeById(recipeId);
      if (!recipe) {
        showError('Recipe not found');
        return;
      }
      
      // Use the backend ID if available for consistency
      const actualId = recipe.__backendId || recipe.id;
      
      // Check if already in meal options
      if (state.mealOptions.some(opt => opt.recipeId === actualId || opt.recipeId === recipeId)) {
        showToast('Already in Meal Options!', 'info');
        return;
      }
      
      // Map recipe category to meal option category
      const categoryMap = {
        'Breakfast': 'Breakfast',
        'Lunch': 'Lunch',
        'Dinner': 'Dinner',
        'Snack': 'Appetizer',
        'Dessert': 'Appetizer',
        'Side Dish': 'Vegetables',
        'Vegetables': 'Vegetables',
        'Appetizer': 'Appetizer'
      };
      
const mealCategory = category || categoryMap[recipe.category] || recipe.category || 'Dinner';
      
      const newOption = {
        id: `mealopt_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        recipeId: actualId,
        category: mealCategory
      };
      
      console.log('Adding meal option:', newOption);
      
      state.mealOptions.push(newOption);
      storage.create(newOption);
      
      showToast(`Added to ${mealCategory} options!`, 'success');
      render();

    async function saveCookedMeal(recipeId) {
      const dateInput = document.getElementById('cookDate');
      const mealTypeSelect = document.getElementById('cookMealType');
      
      const date = dateInput.value;
      const mealType = mealTypeSelect.value;

      if (!date) {
        showError('Please select a date');
        return;
      }

      const recipe = getRecipeById(recipeId);
      if (!recipe) return;

      state.isLoading = true;
      closeModal();
      render();

      try {
        // Update cook count
        const updatedRecipe = { 
          ...recipe, 
          timesCooked: (recipe.timesCooked || 0) + 1 
        };

    function getGroceryList() {
      const aggregated = {};
      if (!state.mealSelections || !Array.isArray(state.mealSelections)) return [];
      state.mealSelections.forEach(sel => {
        const parts = sel.id.split('_');
        const date = parts[1];
        const meal = parts[2];
        const recipeIdFromSel = parts.slice(3).join('_'); // Handle recipe IDs that might contain underscores
        
      // Handle manual items
        if (recipeIdFromSel === 'manual' && sel.manualItem) {
          const k = normalizeIngredient(sel.manualItem.name);
          aggregated[k] = {
            name: sel.manualItem.name,
            quantity: '',
            unit: '',
            group: sel.manualItem.group || 'Other',
            checked: false
          };
          return;
        }

        const r = getRecipeById(recipeIdFromSel);
        if (!r) return;

        let keys = [];
        try {
          keys = JSON.parse(sel.includedIngredientKeys || '[]');
        } catch (e) {
          keys = [];
        }

        recipeIngList(r).forEach(ing => {
          const k = normalizeIngredient(ing.name);
          if (!keys.includes(k)) return;

          if (!aggregated[k]) {
            aggregated[k] = {
              name: ing.name,
              quantity: ing.qty || '',
              unit: ing.unit || '',
              group: ing.group || 'Other',
              checked: false
            };
          }
        });
      });

   Object.keys(aggregated).forEach(k => {
        const gi = state.groceryItems.find(x => x.ingredientKey === k);
        aggregated[k].checked = gi ? !!gi.checked : false;
      });

      // Get all manual items from mealSelections
      state.mealSelections.forEach(sel => {
        if (sel.meal === 'manual' && sel.manualItem) {
          const k = normalizeIngredient(sel.manualItem.name);
          if (!aggregated[k]) {
            aggregated[k] = {
              name: sel.manualItem.name,
              quantity: '',
              unit: '',
              group: sel.manualItem.group || 'Other',
              checked: false
            };
            const gi = state.groceryItems.find(x => x.ingredientKey === k);
            aggregated[k].checked = gi ? !!gi.checked : false;
          }
        }
      });

      return Object.values(aggregated);
    }

  async function toggleGroceryItem(ingredientKey) {
      let item = state.groceryItems.find(gi => gi.ingredientKey === ingredientKey);
      let isNew = false;

      // Optimistic update - toggle immediately
      if (item) {
        item.checked = !item.checked;
      } else {
        if (state.groceryItems.length >= 999) {
          showError('Maximum limit reached');
          return;
        }
        item = {
          id: `grocery_${Date.now()}_${ingredientKey}`,
          ingredientKey: ingredientKey,
          checked: true
        };
        state.groceryItems.push(item);
        isNew = true;
      }
      
      // Block real-time updates briefly
      state.ignoreRealtimeUntil = Date.now() + 2000;
      render();

      // Save to database in background
      try {
        if (isNew) {
          await storage.create(item);
        } else {
          await storage.update(item);
        }
      } catch (e) {
        console.error('Failed to save grocery toggle:', e);
        // Revert on error
        if (isNew) {
          state.groceryItems = state.groceryItems.filter(gi => gi.id !== item.id);

        }

      }

   async function removeFromGroceryList(ingredientKey) {
      // Optimistic update - remove from UI immediately
      const selectionsWithIngredient = state.mealSelections.filter(sel => {
        try {
          const keys = JSON.parse(sel.includedIngredientKeys || '[]');
          return keys.includes(ingredientKey);
        } catch (e) {
          return false;
        }
      });

      // Update state immediately
      for (const sel of selectionsWithIngredient) {
        let keys = JSON.parse(sel.includedIngredientKeys || '[]');
        keys = keys.filter(k => k !== ingredientKey);
        sel.includedIngredientKeys = JSON.stringify(keys);
      }
      
      state.groceryItems = state.groceryItems.filter(gi => gi.ingredientKey !== ingredientKey);
      
      render();
      showToast('Ingredient removed from grocery list', 'success');

      // Save to database in background
      try {
        for (const sel of selectionsWithIngredient) {
          await storage.update(sel);
        }

        const item = state.groceryItems.find(gi => gi.ingredientKey === ingredientKey);
        if (item) {
          await storage.delete(item);
        }
      } catch (e) {
        console.error('Failed to remove from grocery list:', e);
      }
    }

              dinner: plan.dinner ? [plan.dinner] : []

          // Ensure arrays exist even if empty

          };
        });

state.budgetExpenses = data.filter(d => d.id && d.id.startsWith('expense_'));

      };
const getYear = (date) => new Date(date + 'T00:00:00').getFullYear();

        byWeek[weekStart][exp.type] += exp.amount;
        byWeek[weekStart].total += exp.amount;
      });
      
      const byMonth = {};

        byMonth[monthKey].total += exp.amount;

        byYear[year][exp.type] += exp.amount;

console.log('byMonth:', byMonth);

    .filter(r => !r.isDraft && !r.isTip)
    .sort((a, b) => (b.timesCooked || 0) - (a.timesCooked || 0));

   async function addExternalMealType() {
      const nameInput = document.getElementById('newExternalMealType');
      const emojiInput = document.getElementById('newExternalMealEmoji');
      const newName = nameInput.value.trim();
      const newEmoji = emojiInput.value.trim() || '🍽️';
      
      if (!newName) {
        showError('Please enter a meal type name');
        return;
      }

      // Convert old format if needed
      state.externalMealTypes = state.externalMealTypes.map(t => 
        typeof t === 'string' ? { name: t, emoji: '🍽️' } : t
      );

      if (state.externalMealTypes.some(t => t.name === newName)) {
        showError('This type already exists');
        return;
      }

      state.externalMealTypes.push({ name: newName, emoji: newEmoji });
      await saveExternalMealTypesConfig();
      showManageExternalMealTypes();
    }

   async function removeExternalMealType(index) {
      if (!confirm('Delete this external meal type?')) return;
      
      // Convert old format if needed
      state.externalMealTypes = state.externalMealTypes.map(t => 
        typeof t === 'string' ? { name: t, emoji: '🍽️' } : t
      );
      
      state.externalMealTypes.splice(index, 1);
      await saveExternalMealTypesConfig();
      showManageExternalMealTypes();
    }

    async function saveExternalMealTypesConfig() {
      const config = {
        id: 'config_externalMealTypes',
        types: state.externalMealTypes
      };

      const existing = storage._data.find(d => d.id === 'config_externalMealTypes');
      if (existing) {
        await storage.update(config);
      } else {
        await storage.create(config);
      }
    }

      const today = new Date();
      const localDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000));
      
      state.freestyleForm = {
        id: null,
        date: localDate.toISOString().split('T')[0],

      };

   function editFreestyle(id) {
      const meal = (state.freestyleMeals || []).find(m => m.id === id);
      if (!meal) return;
      state.freestyleForm = { 
        ...meal,
        narrative: meal.narrative || meal.notes || ''
      };
      state.currentView = 'freestyle-edit';
      render();
    }

   // ===== FREESTYLE ENHANCEMENT FUNCTIONS =====
    
    // Get all unique tags from freestyle meals
    function getAllFreestyleTags() {
      const tags = new Set();
      state.freestyleMeals.forEach(meal => {
        (meal.tags || []).forEach(tag => tags.add(tag));
      });
      return Array.from(tags).sort();
    }

    // Get pending recording needs
    function getPendingRecordingNeeds() {
      return (state.recordingNeeds || []).filter(r => !r.completed);
    }

    // Parse narrative text to extract @mentions and #recording needs
    function parseNarrative(text) {
      const mentions = [];
      const recordingNeeds = [];
      
      const mentionRegex = /@\[([^\]]+)\]\(([^)]+)\)/g;
      let match;
      while ((match = mentionRegex.exec(text)) !== null) {
        mentions.push({ title: match[1], id: match[2], index: match.index });
      }
      
      const recordingRegex = /#\[([^\]]+)\]/g;
      while ((match = recordingRegex.exec(text)) !== null) {
        recordingNeeds.push({ text: match[1], index: match.index });
      }
      
      return { mentions, recordingNeeds };
    }

  // Convert narrative to display HTML
    function narrativeToHtml(text) {
      if (!text) return '';
      
      let html = esc(text);
      
      html = html.replace(/@\[([^\]]+)\]\(([^)]+)\)/g, (match, title, id) => {
        return `<span class="mention-tag cursor-pointer" onclick="openRecipeView('${id}')">${title}</span>`;
      });
      
      html = html.replace(/#\[([^\]]+)\]/g, (match, text) => {
        return `<span class="record-tag">${text}</span>`;
      });
      
      return html;
    }

    // Handle mention dropdown selection
    function selectMention(item) {
      const textarea = document.getElementById('narrativeEditor');
      if (!textarea) return;
      
      const text = textarea.value;
      const cursorPos = state.mentionCursorPosition;
      
      let startPos = cursorPos - 1;
      while (startPos >= 0 && text[startPos] !== '@' && text[startPos] !== '#') {
        startPos--;
      }
      
      let insertText;
      if (state.mentionDropdownType === '@') {
        insertText = `@[${item.title}](${item.id})`;
      } else {
        insertText = `#[${item}]`;
      }
      
      const newText = text.slice(0, startPos) + insertText + text.slice(cursorPos);
      
      state.freestyleForm.narrative = newText;
      state.mentionDropdownVisible = false;
      
      render();
      
      setTimeout(() => {
        const newTextarea = document.getElementById('narrativeEditor');
        if (newTextarea) {
          newTextarea.focus();
          const newPos = startPos + insertText.length;
          newTextarea.setSelectionRange(newPos, newPos);
        }
      }, 0);
    }

    // Handle narrative input with @ and # detection
    function handleNarrativeInput(e) {
      const textarea = e.target;
      const text = textarea.value;
      const cursorPos = textarea.selectionStart;
      
      state.freestyleForm.narrative = text;
      state.mentionCursorPosition = cursorPos;
      
      let startPos = cursorPos - 1;
      let triggerChar = null;
      
      while (startPos >= 0) {
        const char = text[startPos];
        if (char === '@' || char === '#') {
          triggerChar = char;
          break;
        }
        if (char === ' ' || char === '\n') {
          break;
        }
        startPos--;
      }
      
      const wasDropdownVisible = state.mentionDropdownVisible;
      
      if (triggerChar && startPos >= 0) {
        const searchTerm = text.slice(startPos + 1, cursorPos).toLowerCase();
        state.mentionSearchTerm = searchTerm;
        state.mentionDropdownType = triggerChar;
        state.mentionDropdownVisible = true;
        state.mentionDropdownIndex = 0;
      } else {
        state.mentionDropdownVisible = false;
      }
      
      // Only re-render if dropdown state changed (not on every keystroke)
      if (wasDropdownVisible !== state.mentionDropdownVisible || state.mentionDropdownVisible) {
        // Update just the dropdown, not the whole page
        const dropdownContainer = document.getElementById('mentionDropdownContainer');
        if (dropdownContainer) {
          dropdownContainer.innerHTML = renderMentionDropdown();
        } else {
          // Fallback: full render if container not found
          render();
          setTimeout(() => {
            const newTextarea = document.getElementById('narrativeEditor');
            if (newTextarea) {
              newTextarea.focus();
              newTextarea.setSelectionRange(cursorPos, cursorPos);
            }
          }, 0);
        }
      }
    }
    
    // Helper to render just the dropdown
    function renderMentionDropdown() {
      const dropdownItems = state.mentionDropdownVisible ? getMentionDropdownItems() : [];
      
      if (!state.mentionDropdownVisible || dropdownItems.length === 0) {
        return '';
      }
      
      return `
        <div class="mention-dropdown" style="top: 100%; left: 0; right: 0; margin-top: 4px;">
          ${state.mentionDropdownType === '@' ? dropdownItems.map((item, i) => `
            <div class="mention-item ${i === state.mentionDropdownIndex ? 'selected' : ''}"
              onclick="selectMention(${JSON.stringify(item).replace(/"/g, '&quot;')})">
              <span>${item.isTip ? '📝' : '🍽️'}</span>
              <span>${esc(item.title)}</span>
            </div>
          `).join('') : dropdownItems.map((item, i) => `
            <div class="mention-item ${i === state.mentionDropdownIndex ? 'selected' : ''}"
              onclick="selectMention('${esc(item)}')">
              <span>🎥</span>
              <span>${esc(item)}</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Handle keyboard navigation in mention dropdown
    function handleNarrativeKeydown(e) {
      if (!state.mentionDropdownVisible) return;
      
      const items = getMentionDropdownItems();
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        state.mentionDropdownIndex = Math.min(state.mentionDropdownIndex + 1, items.length - 1);
        render();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        state.mentionDropdownIndex = Math.max(state.mentionDropdownIndex - 1, 0);
        render();
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (items.length > 0) {
          e.preventDefault();
          selectMention(items[state.mentionDropdownIndex]);
        }
      } else if (e.key === 'Escape') {
        state.mentionDropdownVisible = false;
        render();
      }
    }

    // Get filtered items for mention dropdown
    function getMentionDropdownItems() {
      const search = state.mentionSearchTerm.toLowerCase();
      
      if (state.mentionDropdownType === '@') {
        return state.recipes
          .filter(r => !r.isDraft)
          .filter(r => r.title.toLowerCase().includes(search))
          .slice(0, 8)
          .map(r => ({
            id: r.__backendId || r.id,
            title: r.title,
            isTip: r.isTip
          }));
      } else {
        const suggestions = [
          'cleaning technique',
          'prep method', 
          'cooking tip',
          'storage tip',
          'seasoning blend'
        ].filter(s => s.includes(search));
        
        if (search && !suggestions.some(s => s === search)) {
          suggestions.unshift(search);
        }
        
        return suggestions.slice(0, 6);
      }
    }

    async function saveFreestyle() {
      const form = state.freestyleForm;
      if (!form) return;
      
      if (!form.image_url && !form.narrative) {
        showError('Please add a photo or write about your meal');
        return;
      }
      
      // Extract mentions and recording needs from narrative
      const parsed = parseNarrative(form.narrative || '');
      const linkedRecipes = parsed.mentions.map(m => m.id);
      const recordingNeedsFromNarrative = parsed.recordingNeeds.map(r => r.text);
      
      const meal = {
        id: form.id || `freestyle_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        type: 'freestyle',
        date: form.date,
        image_url: form.image_url || '',
        narrative: form.narrative || '',
        notes: form.narrative || '', // Keep for backward compatibility
        linkedRecipes: linkedRecipes,
        tags: form.tags || []
      };
      
      try {
        if (form.id) {
          await storage.update(meal);
          state.freestyleMeals = state.freestyleMeals.map(m => m.id === meal.id ? meal : m);
        } else {
          await storage.create(meal);
          state.freestyleMeals = [...(state.freestyleMeals || []), meal];
        }
        
        // Create recording need items from #[...] tags
        for (const needText of recordingNeedsFromNarrative) {
          const existingNeed = state.recordingNeeds.find(r => 
            r.text.toLowerCase() === needText.toLowerCase() && !r.completed
          );
          
          if (!existingNeed) {
            const recordingNeed = {
              id: `recording_${Date.now()}_${Math.random().toString(36).slice(2)}`,
              type: 'recording_need',
              text: needText,
              sourceFreestyleId: meal.id,
              createdAt: new Date().toISOString(),
              completed: false
            };
            await storage.create(recordingNeed);
            state.recordingNeeds.push(recordingNeed);
          }
        }
        
        state.freestyleForm = null;
        state.currentView = 'recipes';
        state.recipeTab = 'freestyle';
        render();
        showToast('Freestyle meal saved!', 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to save');
      }
    }

    async function updateExpense(expenseId) {
      const expense = state.budgetExpenses.find(e => e.id === expenseId);
      if (!expense) return;

      const amount = parseFloat(document.getElementById('editExpenseAmount').value);
      const date = document.getElementById('editExpenseDate').value;
      const note = document.getElementById('editExpenseNote').value.trim();

      if (isNaN(amount) || amount <= 0) {
        showError('Please enter a valid amount');
        return;
      }

      if (!date) {
        showError('Please select a date');
        return;
      }

      state.isLoading = true;
      closeModal();
      render();

      try {
        const updatedExpense = {
          ...expense,
          amount: amount,
          date: date,
          note: note
        };

        await storage.update(updatedExpense);
        showToast('Expense updated!', 'success');
        showManageExpensesModal();
      } catch (e) {
        console.error(e);
        showError('Failed to update expense');
      } finally {
        state.isLoading = false;
        render();
      }
    }

 async function saveBudget() {
      const grocery = parseFloat(document.getElementById('groceryBudgetAmount').value);
      const takeout = parseFloat(document.getElementById('takeoutBudgetAmount').value);
      
      if (isNaN(grocery) || grocery < 0 || isNaN(takeout) || takeout < 0) {
        showError('Please enter valid budget amounts');
        return;
      }
      
      state.isLoading = true;
      closeModal();
      render();
      
      try {
        // Save per-week budget
        const weekBudgetId = `weekBudget_${state.currentWeekStartDate}`;
        const weekBudget = {
          id: weekBudgetId,
          weekStart: state.currentWeekStartDate,
          grocery: grocery,
          takeout: takeout
        };
        
        // Check if exists
        const existing = state.weekBudgets?.find(b => b.id === weekBudgetId);
        if (existing) {
          await storage.update(weekBudget);
        } else {
          await storage.create(weekBudget);
        }
        
        showToast('Budget saved for this week!', 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to save budget');
      } finally {
        state.isLoading = false;
        render();
      }
    }

    async function saveExpense(type) {
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const date = document.getElementById('expenseDate').value;
      const note = document.getElementById('expenseNote').value.trim();

      if (isNaN(amount) || amount <= 0) {
        showError('Please enter a valid amount');
        return;
      }

      if (!date) {
        showError('Please select a date');
        return;
      }

      state.isLoading = true;
      closeModal();
      render();

      try {
        const expense = {
          id: `expense_${Date.now()}_${Math.random().toString(36).slice(2)}`,
          type: type,
          amount: amount,
          date: date,
          note: note
        };

        await storage.create(expense);
        showToast(`${type === 'grocery' ? 'Grocery' : 'Takeout'} expense logged!`, 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to save expense');
      } finally {
        state.isLoading = false;
        render();
      }
    }

    async function deleteExpense(expenseId) {
      const expense = state.budgetExpenses.find(e => e.id === expenseId);
      if (!expense) return;

      state.isLoading = true;
      render();

      try {
        await storage.delete(expense);
        showToast('Expense deleted', 'success');
      } catch (e) {
        console.error(e);
        showError('Failed to delete expense');
      } finally {
        state.isLoading = false;
        render();
      }
    }

   function getWeekExpenses(weekStartDate) {
      const weekDates = getWeekDates(weekStartDate);
      if (!state.budgetExpenses || !Array.isArray(state.budgetExpenses)) {
        return { grocery: 0, takeout: 0, total: 0, expenses: [], budget: 0, groceryBudget: 0, takeoutBudget: 0 };
      }
      const expenses = state.budgetExpenses.filter(e => weekDates.includes(e.date));
      
      const grocery = expenses.filter(e => e.type === 'grocery').reduce((sum, e) => sum + e.amount, 0);
      const takeout = expenses.filter(e => e.type === 'takeout').reduce((sum, e) => sum + e.amount, 0);
      
   // Determine budget for this week
      const today = new Date();
      const weekStart = new Date(weekStartDate + 'T00:00:00');
      const currentWeekStart = new Date(today);
      currentWeekStart.setDate(today.getDate() - today.getDay());
      currentWeekStart.setHours(0, 0, 0, 0);
      
      const isCurrentOrFutureWeek = weekStart >= currentWeekStart;
      const hasExpenses = expenses.length > 0;
      
      // Check for per-week budget override
      const weekBudget = state.weekBudgets?.find(b => b.weekStart === weekStartDate);
      
      let groceryBudget, takeoutBudget;
      
      if (weekBudget) {
        // Use per-week budget if set
        groceryBudget = weekBudget.grocery;
        takeoutBudget = weekBudget.takeout;
      } else if (isCurrentOrFutureWeek || hasExpenses) {
        // Current/future weeks OR past weeks with expenses get the default budget
        groceryBudget = state.groceryBudget;
        takeoutBudget = state.takeoutBudget;
      } else {
        // Past weeks with no expenses get $0 budget (excluded from stats)
        groceryBudget = 0;
        takeoutBudget = 0;
      }
      
      const budget = groceryBudget + takeoutBudget;
      
      return { grocery, takeout, total: grocery + takeout, expenses, budget, groceryBudget, takeoutBudget };
    }

    async function addManualGroceryItem() {
      const nameInput = document.getElementById('manualItemName');
      const groupSelect = document.getElementById('manualItemGroup');
      
      const itemName = nameInput.value.trim();
      const itemGroup = groupSelect.value;
      
      if (!itemName) {
        showError('Please enter an item name');
        return;
      }

      const ingredientKey = normalizeIngredient(itemName);
      
      const manualSelId = `mealSel_manual_${Date.now()}`;
      const manualSel = {
        id: manualSelId,
        mealDate: 'manual',
        meal: 'manual',
        recipeId: 'manual',
        manualItem: {
          name: itemName,
          group: itemGroup
        },
        includedIngredientKeys: JSON.stringify([ingredientKey])
      };

      state.isLoading = true;
      closeModal();
      render();

      try {
        await storage.create(manualSel);
        showToast('Item added to grocery list!', 'success');
      } catch (e) {
        showError('Failed to add item');
        console.error(e);
      } finally {
        state.isLoading = false;
        render();
      }
    }

function renderGroceryByMeal(unchecked, checked) {
  // Group ingredients by their source meal
  const byMeal = {};
  const byCategory = {};
  
  state.mealSelections.forEach(sel => {
    const parts = sel.id.split('_');
    const recipeIdFromSel = parts.slice(3).join('_');
    
    // Handle manual items separately
    if (recipeIdFromSel === 'manual' && sel.manualItem) {
      const group = sel.manualItem.group || 'Other';
      if (!byCategory[group]) byCategory[group] = [];
      
      const item = unchecked.find(i => normalizeIngredient(i.name) === normalizeIngredient(sel.manualItem.name)) ||
                   checked.find(i => normalizeIngredient(i.name) === normalizeIngredient(sel.manualItem.name));
      if (item) byCategory[group].push(item);
      return;
    }
    
    const recipe = getRecipeById(recipeIdFromSel);
    if (!recipe) return;
    
    const mealKey = `${recipe.title}`;
    if (!byMeal[mealKey]) {
      byMeal[mealKey] = { recipe, ingredients: [] };
    }
    
    let keys = [];
    try {
      keys = JSON.parse(sel.includedIngredientKeys || '[]');
    } catch (e) {
      keys = [];
    }
    
    recipeIngList(recipe).forEach(ing => {
      const k = normalizeIngredient(ing.name);
      if (!keys.includes(k)) return;
      
      const item = unchecked.find(i => normalizeIngredient(i.name) === k) ||
                   checked.find(i => normalizeIngredient(i.name) === k);
      if (item && !byMeal[mealKey].ingredients.some(i => normalizeIngredient(i.name) === k)) {
        byMeal[mealKey].ingredients.push(item);
      }
    });
  });
  
  const sortedGroups = ING_GROUPS.filter(g => byCategory[g]);
  Object.keys(byCategory).forEach(g => {
    if (!ING_GROUPS.includes(g)) sortedGroups.push(g);
  });
  
  return `
    <!-- From Meals Section -->
    ${Object.keys(byMeal).length > 0 ? `
      <div class="mb-6">
        <h3 style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.125}px;" class="font-semibold mb-4">
          🍽️ From Meals
        </h3>
        ${Object.entries(byMeal).map(([mealName, data]) => `
          <div class="mb-4">
            <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.05}px; opacity: 0.9; font-weight: 600; padding: 8px 0; border-bottom: 2px solid rgba(102, 126, 234, 0.3); margin-bottom: 8px;">
              ${esc(mealName)}
            </div>
            ${data.ingredients.map(item => {
              const capitalizedName = item.name.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
              ).join(' ');
              
              return `
                <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size}px; ${item.checked ? 'opacity: 0.5; text-decoration: line-through;' : ''}"
                     class="flex items-center justify-between gap-3 p-3 rounded hover:bg-opacity-50">
                  <label class="flex items-center gap-3 cursor-pointer flex-1">
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleGroceryItem('${normalizeIngredient(item.name)}')">
                    <span>${capitalizedName}</span>
                  </label>
                  <button type="button" onclick="removeFromGroceryList('${normalizeIngredient(item.name)}')"
                    class="px-2 py-1 rounded button-hover"
                    style="background:#dc2626; color:white; font-size:${CONFIG.font_size * 0.85}px;">
                    Delete
                  </button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    ` : ''}
    
    <!-- By Category Section -->
    ${sortedGroups.length > 0 ? `
      <div>
        <h3 style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.125}px;" class="font-semibold mb-4">
          📦 By Category
        </h3>
        ${sortedGroups.map(group => `
          <div class="mb-4">
            <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size * 1.05}px; opacity: 0.8; font-weight: 600; padding: 8px 0; border-bottom: 2px solid rgba(255,255,255,0.1); margin-bottom: 8px;">
              ${esc(group)}
            </div>
            ${byCategory[group].map(item => {
              const capitalizedName = item.name.split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
              ).join(' ');
              
              return `
                <div style="color: ${CONFIG.text_color}; font-family: ${CONFIG.font_family}, sans-serif; font-size: ${CONFIG.font_size}px; ${item.checked ? 'opacity: 0.5; text-decoration: line-through;' : ''}"
                     class="flex items-center justify-between gap-3 p-3 rounded hover:bg-opacity-50">
                  <label class="flex items-center gap-3 cursor-pointer flex-1">
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleGroceryItem('${normalizeIngredient(item.name)}')">
                    <span>${capitalizedName}</span>
                  </label>
                  <button type="button" onclick="removeFromGroceryList('${normalizeIngredient(item.name)}')"
                    class="px-2 py-1 rounded button-hover"
                    style="background:#dc2626; color:white; font-size:${CONFIG.font_size * 0.85}px;">
                    Delete
                  </button>
                </div>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    ` : ''}
`;
}

        // Restore focus and cursor position after render
        setTimeout(() => {
          const newInput = document.getElementById('recipeSearchInput');
          if (newInput) {
            newInput.focus();
            newInput.setSelectionRange(cursorPos, cursorPos);
          }
        }, 0);
      }, 600);
 }

    let recipesPageSearchTimeout = null;
    function handleRecipesPageSearch(value) {
      state.searchTerm = value;
      
      if (recipesPageSearchTimeout) clearTimeout(recipesPageSearchTimeout);
      
     recipesPageSearchTimeout = setTimeout(() => {
        const input = document.getElementById('recipesPageSearchInput');
        const cursorPos = input ? input.selectionStart : 0;
        
        render();
        
        setTimeout(() => {
          const newInput = document.getElementById('recipesPageSearchInput');
          if (newInput) {
            newInput.focus();
            newInput.setSelectionRange(cursorPos, cursorPos);
          }
        }, 0);
      }, 600);
    }

function renderRecordingNeeds() {
      const pending = (state.recordingNeeds || []).filter(r => !r.completed);
      const completed = (state.recordingNeeds || []).filter(r => r.completed);
      
      return `
        <div class="p-4 max-w-2xl mx-auto">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold" style="color:${CONFIG.text_color}; font-size:${CONFIG.font_size * 1.5}px;">
              🎥 Things to Record
            </h2>
            <button onclick="showAddRecordingNeedModal()"
              class="px-3 py-1.5 rounded button-hover"
              style="background:${CONFIG.primary_action_color}; color:${CONFIG.text_color};">
              + Add
            </button>
          </div>

          ${pending.length === 0 && completed.length === 0 ? `
            <div class="p-8 rounded text-center" style="background:${CONFIG.surface_color}; color:${CONFIG.text_color};">
              <div style="font-size:3rem; margin-bottom:1rem;">🎬</div>
              <div style="font-size:${CONFIG.font_size * 1.1}px; margin-bottom:0.5rem;">No recording needs yet</div>
              <div style="opacity:0.7; font-size:${CONFIG.font_size * 0.9}px;">
                When you write freestyle meals, use #[topic] to note things you want to record
              </div>
            </div>
          ` : `
            ${pending.length > 0 ? `
              <div class="mb-6">
                <h3 style="color:${CONFIG.text_color}; font-size:${CONFIG.font_size * 1.1}px; margin-bottom:12px;">
                  📋 Pending (${pending.length})
                </h3>
                <div class="space-y-2">
                  ${pending.map(need => {
                    const sourceMeal = need.sourceFreestyleId ? 
                      state.freestyleMeals.find(m => m.id === need.sourceFreestyleId) : null;
                    
                    return `
                    <div class="flex items-center gap-3 p-3 rounded" style="background:${CONFIG.surface_color}; border:1px solid rgba(245, 158, 11, 0.3);">
                      <button onclick="event.stopPropagation(); toggleRecordingNeed('${need.id}')"
                        class="w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0"
                        style="border-color:${CONFIG.accent_color}; color:${CONFIG.accent_color};">
                      </button>
                      <div class="flex-1 ${sourceMeal ? 'cursor-pointer' : ''}" 
                           ${sourceMeal ? `onclick="goToFreestyleMeal('${need.sourceFreestyleId}')"` : ''}>
                        <div style="color:${CONFIG.text_color}; font-size:${CONFIG.font_size}px;">
                          ${esc(need.text)}
                        </div>
                        <div style="color:${CONFIG.text_color}; opacity:0.5; font-size:${CONFIG.font_size * 0.75}px;">
                          Added ${new Date(need.createdAt).toLocaleDateString()}
                          ${sourceMeal ? `<span style="color:${CONFIG.primary_action_color};"> • 📸 From freestyle meal →</span>` : ''}
                        </div>
                      </div>
                      <button onclick="event.stopPropagation(); deleteRecordingNeed('${need.id}')"
                        class="px-2 py-1 rounded button-hover flex-shrink-0"
                        style="background:rgba(220,38,38,0.8); color:white; font-size:${CONFIG.font_size * 0.75}px;">
                        🗑️
                      </button>
                    </div>
                  `}).join('')}
                </div>
              </div>
            ` : ''}
            
            ${completed.length > 0 ? `
              <div>
                <h3 style="color:${CONFIG.text_color}; font-size:${CONFIG.font_size * 1.1}px; margin-bottom:12px; opacity:0.7;">
                  ✅ Completed (${completed.length})
                </h3>
                <div class="space-y-2">
                  ${completed.map(need => {
                    const sourceMeal = need.sourceFreestyleId ? 
                      state.freestyleMeals.find(m => m.id === need.sourceFreestyleId) : null;
                    
                    return `
                    <div class="flex items-center gap-3 p-3 rounded" style="background:${CONFIG.surface_color}; opacity:0.6;">
                      <button onclick="event.stopPropagation(); toggleRecordingNeed('${need.id}')"
                        class="w-6 h-6 rounded border-2 flex items-center justify-center flex-shrink-0"
                        style="border-color:#16a34a; background:#16a34a; color:white;">
                        ✓
                      </button>
                      <div class="flex-1 ${sourceMeal ? 'cursor-pointer' : ''}"
                           ${sourceMeal ? `onclick="goToFreestyleMeal('${need.sourceFreestyleId}')"` : ''}>
                        <div style="color:${CONFIG.text_color}; font-size:${CONFIG.font_size}px; text-decoration:line-through;">
                          ${esc(need.text)}
                        </div>
                        ${sourceMeal ? `
                          <div style="color:${CONFIG.primary_action_color}; opacity:0.7; font-size:${CONFIG.font_size * 0.75}px;">
                            📸 View source meal →
                          </div>
                        ` : ''}
                      </div>
                      <button onclick="event.stopPropagation(); deleteRecordingNeed('${need.id}')"
                        class="px-2 py-1 rounded button-hover flex-shrink-0"
                        style="background:rgba(220,38,38,0.8); color:white; font-size:${CONFIG.font_size * 0.75}px;">
                        🗑️
                      </button>
                    </div>
                  `}).join('')}
                </div>
              </div>
            ` : ''}
          `}
        </div>
      `;
    }


    // ===== MAIN RENDER =====
    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      let content = '';
      switch (state.currentView) {
        case 'home':
          content = renderHome();
          break;
        case 'recipes':
          content = renderRecipes();
          break;
        case 'recipe-edit':
          content = renderRecipeEdit();
          break;
          case 'freestyle-edit':
          content = renderFreestyleEdit();
          break;
        case 'recipe-view':
          content = renderRecipeView();
          break;
        case 'weekly-plan':
          content = renderWeeklyPlan();
          break;
        case 'recipe-picker':
          content = renderRecipePicker();
          break;
        case 'grocery-list':
          content = renderGroceryList();
          break;
        case 'budget-dashboard':
          content = renderBudgetDashboard();
          break;
          case 'recording-needs':
          content = renderRecordingNeeds();
          break;
          case 'inventory':
          content = renderInventory();
          break;
          case 'purchase-history':
          content = renderPurchaseHistory();
          break;
        case 'grocery-select-meals':
          content = renderGrocerySelectMeals();
          break;
       case 'grocery-ingredients':
          content = renderGroceryIngredients();
          break;
        case 'external-meal-picker':
          content = renderExternalMealPicker();
          break;
       case 'recipe-stats':
          content = renderRecipeStats();
          break;
       case 'tips':
          content = renderTips();
          break;
        case 'meal-options':
          content = renderMealOptions();
          break;
        case 'meal-options-recipe-picker':
          content = renderMealOptionsRecipePicker();
          break;
        default:
          content = renderRecipes();
      }
      app.innerHTML = `
        <div style="background: ${CONFIG.background_color}; min-height: 100vh;">
          ${renderNav()}
          ${content}
          ${renderReceiptModal()}
        </div>
      `;
    }

    // ===== INITIALIZATION =====
    async function init() {
      await storage.init(dataHandler);
      // Check for expiring items after data loads
    setTimeout(() => {
      checkExpirationNotifications();
    }, 2000);
      setupKeyboardShortcuts();
      render();
      
      // Show welcome message on first load
      if (state.recipes.length === 0) {
        setTimeout(() => {
          showToast('Welcome! Press ⚙️ to view keyboard shortcuts', 'info');
        }, 500);
      }
    }

    init();
  </script>
</body>
</html>

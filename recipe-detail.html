<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yummy - Recipe Detail</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body class="h-full">
  <div id="app" class="h-full w-full overflow-auto"></div>
  <div id="modal" style="display: none; background: rgba(0,0,0,0.6);" class="fixed inset-0 flex items-center justify-center z-50">
    <div id="modal-content" style="background: #242432; border-radius: 16px 16px 0 0; padding: 12px; color: #f5f5f7;" class="max-w-2xl w-full mx-4 max-h-[85dvh] overflow-auto"></div>
  </div>
  <script src="js/shared.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const recipeId = urlParams.get('id');
    const fromPage = urlParams.get('from');
    const fromIngredient = urlParams.get('ingredient');

    loadAllState();

    function getBackUrl() {
      if (fromPage === 'kitchen' && fromIngredient) {
        return '/kitchen-detail.html?ingredient=' + encodeURIComponent(fromIngredient);
      }
      return '/recipes.html';
    }

    function renderRecipeDetail() {
      const r = getRecipeById(recipeId);
      if (!r) return `<div style="padding: 40px 20px; text-align: center; color: ${CONFIG.text_muted};">
        <div style="font-size: 48px; margin-bottom: 16px;">🍽️</div>
        <div style="font-size: 18px; font-weight: 600; color: ${CONFIG.text_color}; margin-bottom: 8px;">Recipe not found</div>
        <div style="margin-bottom: 24px;">This recipe may have been removed.</div>
        <a href="${getBackUrl()}" style="color: ${CONFIG.primary_action_color}; text-decoration: none; font-weight: 600;">Go back</a>
      </div>`;

      const img = recipeThumb(r);
      const instructions = Array.isArray(r.instructions)
        ? r.instructions.join('\n')
        : (r.instructions || '').trim();

      let rows = [];
      if (Array.isArray(r.ingredientsRows) && r.ingredientsRows.length > 0) {
        rows = r.ingredientsRows;
      } else if (Array.isArray(r.ingredients) && r.ingredients.length > 0) {
        rows = r.ingredients.map(ing => ({
          qty: ing.amount || '',
          unit: ing.unit || '',
          name: ing.item || ing.name || '',
          group: ing.group || 'Other'
        }));
      }
      const grouped = {};
      rows.forEach(x => {
        const g = x.group || 'Other';
        if (!grouped[g]) grouped[g] = [];
        grouped[g].push(x);
      });
      const groupOrder = Object.keys(grouped);

      // Parse instructions into steps
      const instructionSteps = [];
      if (instructions) {
        const lines = instructions.split('\n');
        let currentStep = null;
        lines.forEach(line => {
          const trimmed = line.trim();
          if (!trimmed) return;
          if (/^\d+[\.\)]\s*/.test(trimmed)) {
            if (currentStep) instructionSteps.push(currentStep);
            currentStep = { header: trimmed, details: [] };
          } else if (currentStep) {
            currentStep.details.push(trimmed);
          } else {
            instructionSteps.push({ header: null, details: [trimmed] });
          }
        });
        if (currentStep) instructionSteps.push(currentStep);
      }

      return `
        <div style="padding-bottom: 72px;">
          <!-- Hero image -->
          <div style="position: relative; width: 100%; ${img ? 'height: 280px;' : 'height: 160px;'} overflow: hidden; background: linear-gradient(135deg, #1a1a24, #242432);">
            ${img ? `<img src="${esc(img)}" style="width:100%;height:100%;object-fit:cover;" />` : `
              <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
                <span style="font-size:48px;font-weight:700;color:rgba(255,255,255,0.15);text-align:center;padding:24px;">${esc(r.title)}</span>
              </div>
            `}
            <div style="position: absolute; inset: 0; background: linear-gradient(transparent 40%, rgba(13,13,20,0.9));"></div>
            <button onclick="window.location.href='${getBackUrl()}'" style="position: absolute; top: 12px; left: 12px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
            </button>
            <div style="position: absolute; bottom: 16px; left: 16px; right: 16px;">
              <h1 style="font-size: 24px; font-weight: 700; color: white; margin: 0 0 4px 0;">${esc(r.title)}</h1>
              <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                ${r.cookTime ? `<span style="font-size: 13px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px;">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  ${esc(r.cookTime)}
                </span>` : ''}
                ${r.servings ? `<span style="font-size: 13px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px;">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
                  ${esc(r.servings)} servings
                </span>` : ''}
                ${r.category ? `<span style="font-size: 13px; color: rgba(255,255,255,0.7);">${esc(r.category)}</span>` : ''}
              </div>
            </div>
          </div>

          <div style="padding: 0 16px;">
            <!-- Action buttons -->
            <div style="display: flex; gap: 10px; margin-top: 16px;">
              <button onclick="saveRecipeFromDetail('${r.__backendId || r.id}')" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: ${CONFIG.primary_action_color}; color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;">
                Save recipe
              </button>
              <button onclick="markCookedFromDetail('${r.__backendId || r.id}')" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: none; color: ${CONFIG.text_color}; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;">
                I made this
              </button>
            </div>

            <!-- Ingredients -->
            ${groupOrder.length ? `
              <div style="margin-top: 24px;">
                <h2 style="font-size: 17px; font-weight: 600; color: ${CONFIG.text_color}; margin-bottom: 12px;">Ingredients</h2>
                <div style="background: ${CONFIG.surface_color}; border-radius: 12px; padding: 16px; box-shadow: ${CONFIG.shadow};">
                  ${groupOrder.map(g => `
                    <div style="margin-bottom: 12px;">
                      ${groupOrder.length > 1 ? `<div style="font-size: 13px; font-weight: 600; color: ${CONFIG.primary_action_color}; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">${esc(g)}</div>` : ''}
                      ${grouped[g].map(x => {
                        const qty = (x.qty || '').trim();
                        const unit = (x.unit || '').trim();
                        const name = (x.name || '').trim();
                        return `
                          <div style="display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid ${CONFIG.divider_color};">
                            <span style="color: ${CONFIG.primary_action_color}; margin-top: 2px; flex-shrink: 0;">&#8226;</span>
                            <span style="font-size: 14px; color: ${CONFIG.text_color}; line-height: 1.4;">${qty ? esc(qty) + ' ' : ''}${unit ? esc(unit) + ' ' : ''}${esc(capitalize(name))}</span>
                          </div>
                        `;
                      }).join('')}
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <!-- Instructions -->
            <div style="margin-top: 24px;">
              <h2 style="font-size: 17px; font-weight: 600; color: ${CONFIG.text_color}; margin-bottom: 12px;">Instructions</h2>
              ${instructionSteps.length ? `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                  ${instructionSteps.map((step, idx) => `
                    <div style="background: ${CONFIG.surface_color}; border-radius: 12px; padding: 14px 16px; box-shadow: ${CONFIG.shadow}; border-left: 3px solid ${CONFIG.primary_action_color};">
                      ${step.header ? `<div style="font-weight: 600; color: ${CONFIG.primary_action_color}; margin-bottom: 4px; font-size: 14px;">${esc(step.header)}</div>` : ''}
                      ${step.details.map(d => `<div style="font-size: 14px; color: ${CONFIG.text_color}; line-height: 1.5; ${step.header ? 'padding-left: 8px;' : ''}">${esc(d)}</div>`).join('')}
                    </div>
                  `).join('')}
                </div>
              ` : `
                <div style="background: ${CONFIG.surface_color}; border-radius: 12px; padding: 24px; text-align: center; color: ${CONFIG.text_muted};">
                  No instructions available.
                </div>
              `}
            </div>

            ${r.notes ? `
              <div style="margin-top: 24px;">
                <h2 style="font-size: 17px; font-weight: 600; color: ${CONFIG.text_color}; margin-bottom: 12px;">Notes</h2>
                <div style="background: ${CONFIG.surface_color}; border-radius: 12px; padding: 16px; box-shadow: ${CONFIG.shadow}; color: ${CONFIG.text_color}; font-size: 14px; line-height: 1.5; white-space: pre-wrap;">${esc(r.notes)}</div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    function saveRecipeFromDetail(id) {
      const r = getRecipeById(id);
      if (!r) return;
      if (r.favorite) {
        showToast(r.title + ' is already saved!');
        return;
      }
      r.favorite = true;
      if (typeof storage !== 'undefined' && storage.update) storage.update(r);
      showToast('Saved ' + r.title + '!', 'success');
      render();
    }

    function markCookedFromDetail(id) {
      const r = getRecipeById(id);
      if (!r) return;
      r.timesCooked = (r.timesCooked || 0) + 1;
      r.lastCooked = new Date().toISOString();
      if (typeof storage !== 'undefined' && storage.update) storage.update(r);
      // Add to food log
      if (typeof addFoodLogEntry === 'function') {
        addFoodLogEntry({
          recipeId: r.__backendId || r.id,
          recipeName: r.title,
          image: recipeThumb(r),
          ingredients: recipeIngList(r).map(i => i.name),
          category: r.category || '',
          mealType: 'dinner',
          dateCooked: new Date().toISOString(),
          photo: recipeThumb(r),
          myPhoto: null,
          notes: null,
          wouldMakeAgain: null,
          status: 'eaten'
        });
      }
      showToast('Marked ' + r.title + ' as cooked!', 'success');
      render();
    }

    setupKeyboardShortcuts();

    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      const content = renderRecipeDetail();
      app.innerHTML = `
        <div class="${getAppShellClass()}" style="background: ${CONFIG.background_color}; min-height: 100vh; padding-bottom: 72px;">
          ${renderDesktopSidebar()}
          <div class="desktop-content-area" style="padding: 0;">
            ${content}
          </div>
          ${renderBottomNav()}
        </div>
      `;
    }

    render();
  </script>
</body>
</html>

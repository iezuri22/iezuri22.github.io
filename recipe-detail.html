<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PotLuck">
  <meta name="theme-color" content="#1a1a24">
  <link rel="manifest" href="manifest.json">
  <title>PotLuck - Recipe Detail</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <link rel="stylesheet" href="css/shared.css?v=12">
  <link rel="stylesheet" href="css/recipes.css?v=4">
  <link rel="stylesheet" href="css/recipe-detail.css?v=10">
</head>
<body>
  <div id="app"></div>
  <div id="modal" style="display: none; background: rgba(0,0,0,0.6);" class="fixed inset-0 flex items-center justify-center z-50">
    <div id="modal-content" style="background: #242432; border-radius: 16px 16px 0 0; padding: 12px; color: #f5f5f7;" class="max-w-2xl w-full mx-4 max-h-[85dvh] overflow-auto"></div>
  </div>
  <script src="js/shared.js?v=50"></script>
  <script src="js/video-preview.js?v=4"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const recipeId = urlParams.get('id');
    const fromPage = urlParams.get('from');
    const fromIngredient = urlParams.get('ingredient');
    const fromPlan = fromPage === 'plan';
    if (fromPlan && typeof state !== 'undefined') {
      state.prepAutoOpenContext = 'plan';
    }

    loadAllState();

    function getBackUrl() {
      if (fromPage === 'kitchen' && fromIngredient) {
        return '/kitchen-detail.html?ingredient=' + encodeURIComponent(fromIngredient);
      }
      return '/recipes.html';
    }

    function goBackSafe() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = getBackUrl();
      }
    }

    function saveRecipeFromDetail(id) {
      const r = getRecipeById(id);
      if (!r) { showToast('Recipe not found', 'error'); return; }
      if (r.favorite) {
        showToast(r.title + ' is already saved!');
        return;
      }
      r.favorite = true;
      if (typeof storage !== 'undefined' && storage.update) storage.update(r);
      showToast('Saved ' + r.title + '!', 'success');
      render();
    }

    function editRecipeFromDetail(id) {
      sessionStorage.setItem('yummy_edit_recipe_id', id);
      window.location.href = '/recipes.html';
    }

    setupKeyboardShortcuts();

    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      const content = renderRecipeDetailV2(recipeId, {
        onBack: 'goBackSafe()',
        standalone: true,
        fromPlan: fromPlan
      });

      app.innerHTML = `
        <div class="${getAppShellClass()}">
          ${renderDesktopSidebar()}
          <div class="desktop-content-area" style="padding: 0;">
            ${content}
          </div>
          ${renderBottomNav()}
        </div>
      `;

      // Init video preview observer after each render so prep step videos
      // play when their card is on-screen inside the reels modal.
      if (typeof initVideoPreviewObserver === 'function') {
        initVideoPreviewObserver();
      }
    }

    render();

    // Context A — arrived from This Week's Meals: auto-open the prep modal
    // if prep_state.status is "not_started". Otherwise the CTA shows
    // "Continue prep (X/Y ready)" so the user can pick up where they left off.
    if (fromPlan && recipeId) {
      const r = typeof getRecipeById === 'function' ? getRecipeById(recipeId) : null;
      const prepCtx = (r && typeof resolvePrepContext === 'function') ? resolvePrepContext(recipeId, r) : null;
      const status = prepCtx?.meal?.prep_status || 'not_started';
      if (status === 'not_started') {
        openPrepReels(recipeId);
      }
    }
  </script>
</body>
</html>

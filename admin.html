<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a24">
  <title>Manage Recipe Videos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #1a1a24;
      --elevated: #242432;
      --text: #f5f5f7;
      --text-muted: #8e8e93;
      --text-tertiary: #5c5c66;
      --primary: #e85d5d;
      --primary-subtle: rgba(232, 93, 93, 0.1);
      --success: #32d74b;
      --danger: #ff453a;
      --divider: rgba(255, 255, 255, 0.06);
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      min-height: 100dvh;
    }
    input, textarea {
      background: rgba(0,0,0,0.2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 60px; }
    button { font-family: var(--font); cursor: pointer; border: none; }
    .btn-primary {
      background: var(--primary); color: white; font-weight: 700;
      padding: 10px 20px; border-radius: 10px; font-size: 15px;
    }
    .btn-secondary {
      background: var(--elevated); color: var(--text);
      padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 600;
    }
    .btn-ghost {
      background: none; color: var(--text-muted); padding: 8px; border-radius: 8px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); }
    .toast {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      background: var(--elevated); color: var(--text); border-radius: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow); animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Header */
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--divider);
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    }
    .admin-header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }

    /* Layout */
    .admin-body { display: flex; flex-direction: column; height: calc(100dvh - 53px); }
    @media (min-width: 768px) {
      .admin-body { flex-direction: row; }
      .recipe-list-panel { width: 300px; flex-shrink: 0; border-right: 1px solid var(--divider); height: calc(100dvh - 53px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .clip-editor-panel { flex: 1; height: calc(100dvh - 53px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    }
    @media (max-width: 767px) {
      .admin-body { height: auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .recipe-list-panel { max-height: none; overflow: visible; }
      .recipe-scroll { overflow-y: visible; padding-bottom: 0; }
      .clip-editor-panel { flex: 1; min-height: 60vh; padding-bottom: 100px; }
    }

    /* Recipe list */
    .recipe-list-panel {
      display: flex; flex-direction: column; min-height: 0;
    }
    .filter-bar {
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
      border-bottom: 1px solid var(--divider); flex-shrink: 0;
    }
    .filter-pills { display: flex; gap: 6px; }
    .filter-pill {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      background: transparent; color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .filter-pill.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .recipe-scroll { flex: 1; overflow-y: visible; padding-bottom: 12px; }
    .recipe-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      cursor: pointer; border-bottom: 1px solid var(--divider);
      transition: background 0.15s;
    }
    .recipe-row:hover { background: rgba(255,255,255,0.03); }
    .recipe-row.selected { background: var(--primary-subtle); }
    .recipe-row img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .recipe-row .no-img {
      width: 48px; height: 48px; border-radius: 8px; background: var(--elevated);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      color: var(--text-tertiary); font-size: 20px;
    }
    .recipe-row .info { flex: 1; min-width: 0; }
    .recipe-row .name {
      font-size: 14px; font-weight: 600; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .recipe-row .badge {
      font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-clips { background: rgba(50,215,75,0.15); color: var(--success); }
    .badge-none { background: rgba(255,255,255,0.05); color: var(--text-tertiary); }

    /* Clip editor */
    .clip-editor-panel { padding: 16px; padding-bottom: 120px; min-height: 0; }
    .clip-card {
      background: var(--surface); border-radius: 12px; padding: 12px;
      margin-bottom: 12px; box-shadow: var(--shadow);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .clip-card .drag-handle {
      cursor: grab; color: var(--text-tertiary); padding: 4px;
      display: flex; align-items: center; flex-shrink: 0; margin-top: 4px;
    }
    .clip-card .clip-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
    .clip-card .clip-thumb {
      width: 80px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
      background: var(--elevated);
    }
    .clip-card .clip-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .clip-card .video-id { font-size: 11px; color: var(--text-tertiary); font-family: monospace; word-break: break-all; }
    .validation-ok { color: var(--success); font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .validation-err { color: var(--danger); font-size: 12px; font-weight: 500; }
    .mini-player { width: 200px; height: 113px; border-radius: 8px; border: none; margin-top: 4px; }

    /* Plates section */
    .plates-section { border-top: 1px solid var(--divider); padding: 12px; padding-bottom: 80px; }
    .plates-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
    .plate-row {
      display: flex; align-items: center; gap: 10px; padding: 8px;
      border-radius: 10px; cursor: pointer; margin-bottom: 4px;
    }
    .plate-row:hover { background: rgba(255,255,255,0.03); }
    .plate-row.selected { background: var(--primary-subtle); }
    .plate-comp {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 24px;
      cursor: pointer; border-radius: 8px;
    }
    .plate-comp:hover { background: rgba(255,255,255,0.03); }

    /* Video order list (plates) */
    .video-order-list { display: flex; flex-direction: column; gap: 8px; }
    .video-order-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: var(--surface); border-radius: 10px;
    }
    .video-order-item .drag-handle { cursor: grab; color: var(--text-tertiary); flex-shrink: 0; }
    .video-order-item img { width: 60px; height: 45px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .video-order-item .vo-info { flex: 1; min-width: 0; }
    .video-order-item .vo-caption { font-size: 13px; font-weight: 500; }
    .video-order-item .vo-from { font-size: 11px; color: var(--text-muted); }

    /* Dragging */
    .dragging { opacity: 0.4; }
    .drag-over { border: 2px dashed var(--primary); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="admin-header">
    <a href="index.html" style="color: var(--text); text-decoration: none; display: flex; align-items: center;">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
      </svg>
    </a>
    <h1>Manage Recipe Videos</h1>
  </div>

  <div class="admin-body">
    <!-- Left: Recipe List -->
    <div class="recipe-list-panel" id="recipeListPanel">
      <div class="filter-bar">
        <input type="text" id="recipeSearch" placeholder="Search recipes..." oninput="filterRecipes()" />
        <div class="filter-pills">
          <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">All recipes</button>
          <button class="filter-pill" data-filter="with" onclick="setFilter('with')">With clips</button>
          <button class="filter-pill" data-filter="without" onclick="setFilter('without')">Without clips</button>
        </div>
      </div>
      <div class="recipe-scroll" id="recipeScroll"></div>
      <div class="plates-section" id="platesSection"></div>
    </div>

    <!-- Right: Clip Editor -->
    <div class="clip-editor-panel" id="clipEditorPanel">
      <div id="editorContent" style="max-width: 700px; margin: 0 auto;">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center;">
          <div style="font-size:36px; margin-bottom:8px; opacity:0.3;">🎬</div>
          <div style="color:var(--text-muted); font-size:14px; max-width:240px;">Select a recipe from the list to manage its video clips</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // DATA LAYER — reads from same localStorage as main app
    // ============================================================
    const CLOUDFLARE_STREAM_SUBDOMAIN = 'customer-3z4sk2e6gw4kp3xc.cloudflarestream.com';

    function saveToLS(key, data) { localStorage.setItem('yummy_' + key, JSON.stringify(data)); }
    function loadFromLS(key, def) {
      try { const d = localStorage.getItem('yummy_' + key); return d ? JSON.parse(d) : def; }
      catch(e) { return def; }
    }
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function getStreamThumbnail(videoId) {
      return `https://${CLOUDFLARE_STREAM_SUBDOMAIN}/${videoId}/thumbnails/thumbnail.jpg?time=&height=400`;
    }
    function getStreamEmbedUrl(videoId, opts = {}) {
      const { autoplay = false, muted = true, controls = true, loop = true } = opts;
      const poster = encodeURIComponent(`https://${CLOUDFLARE_STREAM_SUBDOMAIN}/${videoId}/thumbnails/thumbnail.jpg?time=&height=600`);
      return `https://${CLOUDFLARE_STREAM_SUBDOMAIN}/${videoId}/iframe?muted=${muted}&preload=true&loop=${loop}&autoplay=${autoplay}&controls=${controls}&poster=${poster}`;
    }
    function recipeThumb(r) {
      const u = (r?.image_url || '').trim();
      if (!u) return '';
      if (u.startsWith('http://') || u.startsWith('https://') || u.startsWith('data:')) return u;
      return 'https://' + u;
    }
    function getRecipeById(id) {
      if (!id) return null;
      return recipes.find(r => r.__backendId === id || r.id === id) || null;
    }

    let recipes = loadFromLS('recipes', []);
    let batchRecipes = loadFromLS('batchRecipes', []);
    let selectedRecipeId = null;
    let selectedPlateId = null;
    let currentFilter = 'all';
    let editingClips = []; // working copy of clips for selected recipe
    let expandedPlateId = null;
    let plateVideoOrderEditing = null; // { batchId, videoOrder: [...] }

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.className = 'toast';
      if (type === 'success') t.style.borderLeft = '4px solid var(--success)';
      else if (type === 'error') t.style.borderLeft = '4px solid var(--danger)';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    // ============================================================
    // RECIPE LIST
    // ============================================================
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === f));
      renderRecipeList();
    }

    function filterRecipes() { renderRecipeList(); }

    function renderRecipeList() {
      const search = (document.getElementById('recipeSearch')?.value || '').toLowerCase().trim();
      let list = recipes.filter(r => !r.isTip && !r.isDraft);

      if (search) list = list.filter(r => (r.title || '').toLowerCase().includes(search));
      if (currentFilter === 'with') list = list.filter(r => r.videoClips && r.videoClips.length > 0);
      else if (currentFilter === 'without') list = list.filter(r => !r.videoClips || r.videoClips.length === 0);

      // Sort: recipes with clips first
      list.sort((a, b) => {
        const ac = (a.videoClips || []).length;
        const bc = (b.videoClips || []).length;
        if (ac > 0 && bc === 0) return -1;
        if (ac === 0 && bc > 0) return 1;
        return (a.title || '').localeCompare(b.title || '');
      });

      const container = document.getElementById('recipeScroll');
      if (list.length === 0) {
        container.innerHTML = `<div style="padding:24px; text-align:center; color:var(--text-muted); font-size:13px;">No recipes found</div>`;
        return;
      }

      container.innerHTML = list.map(r => {
        const id = r.__backendId || r.id;
        const clipCount = (r.videoClips || []).length;
        const thumb = recipeThumb(r);
        const isSelected = id === selectedRecipeId;
        return `
          <div class="recipe-row ${isSelected ? 'selected' : ''}" onclick="selectRecipe('${esc(id)}')">
            ${thumb ? `<img src="${esc(thumb)}" alt="" />` : `<div class="no-img">🍽</div>`}
            <div class="info">
              <div class="name">${esc(r.title)}</div>
            </div>
            <span class="badge ${clipCount > 0 ? 'badge-clips' : 'badge-none'}">
              ${clipCount > 0 ? clipCount + ' clip' + (clipCount !== 1 ? 's' : '') : 'No clips'}
            </span>
          </div>
        `;
      }).join('');
    }

    // ============================================================
    // PLATES SECTION
    // ============================================================
    function renderPlatesSection() {
      const container = document.getElementById('platesSection');
      if (batchRecipes.length === 0) { container.innerHTML = ''; return; }

      container.innerHTML = `
        <h3>Plates</h3>
        ${batchRecipes.map(batch => {
          const comps = (batch.components || []).filter(c => c.type === 'recipe' && c.recipeId);
          const isSelected = selectedPlateId === batch.id;
          return `
            <div class="plate-row ${isSelected ? 'selected' : ''}" onclick="selectPlate('${esc(batch.id)}')">
              <svg width="16" height="16" fill="none" stroke="${isSelected ? 'var(--primary)' : 'var(--text-muted)'}" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
              </svg>
              <span style="font-size:14px; font-weight:500;">${esc(batch.name || 'Untitled Plate')}</span>
              <span style="font-size:11px; color:var(--text-muted); margin-left:auto;">${comps.length} recipe${comps.length !== 1 ? 's' : ''}</span>
            </div>
          `;
        }).join('')}
      `;
    }

    function selectPlate(batchId) {
      selectedPlateId = batchId;
      selectedRecipeId = null;
      expandedPlateId = batchId;
      loadPlateVideoOrder(batchId);
      renderRecipeList();
      renderPlatesSection();
      renderRightPanel();
    }

    function renderRightPanel() {
      if (selectedPlateId) {
        const batch = batchRecipes.find(b => b.id === selectedPlateId);
        if (batch) {
          const editor = document.getElementById('editorContent');
          editor.innerHTML = renderPlateDetail(batch);
          return;
        }
      }
      // If no plate selected and no recipe, show empty state
      if (!selectedRecipeId) {
        const editor = document.getElementById('editorContent');
        editor.innerHTML = `
          <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center;">
            <div style="font-size:36px; margin-bottom:8px; opacity:0.3;">🎬</div>
            <div style="color:var(--text-muted); font-size:14px; max-width:240px;">Select a recipe or plate from the list to manage video clips</div>
          </div>
        `;
      }
    }

    function renderPlateDetail(batch) {
      const comps = (batch.components || []).filter(c => c.type === 'recipe' && c.recipeId);

      // Plate header
      let headerHtml = `
        <div style="margin-bottom:20px;">
          <div style="font-size:17px; font-weight:700; margin-bottom:4px;">${esc(batch.name || 'Untitled Plate')}</div>
          <div style="font-size:13px; color:var(--text-muted);">${comps.length} component recipe${comps.length !== 1 ? 's' : ''}</div>
        </div>
      `;

      // Component recipes list
      let compListHtml = `
        <div style="margin-bottom:16px;">
          <div style="font-size:11px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">Component Recipes</div>
          ${comps.map(comp => {
            const r = getRecipeById(comp.recipeId);
            const name = r ? r.title : comp.name;
            const clipCount = r && r.videoClips ? r.videoClips.length : 0;
            const thumb = r ? recipeThumb(r) : '';
            return `
              <div class="plate-comp" onclick="selectRecipe('${esc(comp.recipeId)}')">
                ${thumb ? `<img src="${esc(thumb)}" style="width:32px; height:32px; border-radius:6px; object-fit:cover;" />` :
                  `<div style="width:32px; height:32px; border-radius:6px; background:var(--elevated); display:flex; align-items:center; justify-content:center; font-size:14px;">🍽</div>`}
                <span style="font-size:13px; flex:1;">${esc(name)}</span>
                <span class="badge ${clipCount > 0 ? 'badge-clips' : 'badge-none'}" style="font-size:10px;">
                  ${clipCount > 0 ? clipCount + ' clip' + (clipCount !== 1 ? 's' : '') : 'No clips'}
                </span>
              </div>
            `;
          }).join('')}
        </div>
      `;

      // Preview button
      const plateSequence = buildPlateVideoSequence(batch);
      const totalClips = plateSequence.length;
      const hasClips = totalClips > 0;
      const previewBtnHtml = `
        <button onclick="previewPlateVideo('${esc(batch.id)}')" class="btn-secondary" style="width:100%; margin-bottom:16px; padding:12px; display:flex; align-items:center; justify-content:center; gap:8px; ${!hasClips ? 'opacity:0.4; pointer-events:none;' : ''}"
          ${!hasClips ? 'disabled' : ''}>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
          Preview full plate video (${totalClips} clip${totalClips !== 1 ? 's' : ''})
        </button>
      `;

      // Clip sequence
      let clipSummaryHtml = '';
      if (hasClips) {
        clipSummaryHtml = `
          <div style="margin-bottom:16px;">
            <div style="font-size:11px; font-weight:600; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">Clip Sequence</div>
            ${plateSequence.map((item, i) => {
              const thumb = item.cloudflareVideoId ? getStreamThumbnail(item.cloudflareVideoId) : '';
              return `
                <div style="display:flex; align-items:center; gap:8px; padding:4px 0;">
                  <span style="font-size:10px; color:var(--text-muted); width:16px; text-align:right; flex-shrink:0;">${i + 1}</span>
                  ${thumb
                    ? `<img src="${esc(thumb)}" style="width:40px; height:30px; border-radius:4px; object-fit:cover; flex-shrink:0;" />`
                    : `<div style="width:40px; height:30px; border-radius:4px; background:var(--elevated); flex-shrink:0;"></div>`}
                  <span style="font-size:12px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(item.caption || 'Untitled clip')}</span>
                  <span style="font-size:11px; color:var(--text-muted); flex-shrink:0; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${esc(item.componentName || '')}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      // Video order editor
      let videoOrderHtml = '';
      if (plateVideoOrderEditing && plateVideoOrderEditing.batchId === batch.id) {
        const vo = plateVideoOrderEditing.videoOrder;
        if (vo.length > 0) {
          videoOrderHtml = `
            <div style="padding-top:16px; border-top:1px solid var(--divider);">
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:13px; font-weight:600; color:var(--text-muted);">Video Order</span>
                <button class="btn-primary" style="font-size:12px; padding:6px 14px;" onclick="savePlateVideoOrder('${esc(batch.id)}')">Save Order</button>
              </div>
              <div class="video-order-list" id="plateVideoOrder_${esc(batch.id)}">
                ${vo.map((ref, idx) => renderPlateVideoOrderItem(ref, idx, batch.id)).join('')}
              </div>
              <button class="btn-primary" style="font-size:13px; padding:10px 20px; width:100%; margin-top:12px;" onclick="savePlateVideoOrder('${esc(batch.id)}')">Save Order</button>
            </div>
          `;
        }
      }

      return headerHtml + compListHtml + previewBtnHtml + clipSummaryHtml + videoOrderHtml;
    }

    // renderPlateExpanded removed — plate details now render in the right panel via renderPlateDetail

    function renderPlateVideoOrderItem(ref, idx, batchId) {
      const r = getRecipeById(ref.recipeId);
      const recipeName = r ? r.title : 'Unknown recipe';
      const clips = r && r.videoClips ? r.videoClips.slice().sort((a,b) => (a.order||0)-(b.order||0)) : [];
      const clip = clips[ref.clipIndex] || {};
      const thumb = clip.cloudflareVideoId ? getStreamThumbnail(clip.cloudflareVideoId) : '';
      const caption = clip.caption || `Clip ${ref.clipIndex + 1}`;

      return `
        <div class="video-order-item" draggable="true"
          ondragstart="onPlateVODragStart(event, ${idx})"
          ondragover="onPlateVODragOver(event)"
          ondragenter="event.currentTarget.classList.add('drag-over')"
          ondragleave="event.currentTarget.classList.remove('drag-over')"
          ondrop="onPlateVODrop(event, ${idx})">
          <div class="drag-handle">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg>
          </div>
          ${thumb ? `<img src="${esc(thumb)}" alt="" />` : `<div style="width:60px;height:45px;border-radius:6px;background:var(--elevated);"></div>`}
          <div class="vo-info">
            <div class="vo-caption">${esc(caption)}</div>
            <div class="vo-from">from ${esc(recipeName)}</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:2px;">
            <button class="btn-ghost" style="padding:2px;" onclick="movePlateVOItem(${idx}, -1)" ${idx === 0 ? 'disabled style="opacity:0.3;padding:2px;"' : ''}>
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
            </button>
            <button class="btn-ghost" style="padding:2px;" onclick="movePlateVOItem(${idx}, 1)" ${idx === plateVideoOrderEditing.videoOrder.length - 1 ? 'disabled style="opacity:0.3;padding:2px;"' : ''}>
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </button>
          </div>
        </div>
      `;
    }

    function loadPlateVideoOrder(batchId) {
      const batch = batchRecipes.find(b => b.id === batchId);
      if (!batch) return;

      // If batch already has a saved videoOrder, use it
      if (batch.videoOrder && batch.videoOrder.length > 0) {
        plateVideoOrderEditing = { batchId, videoOrder: JSON.parse(JSON.stringify(batch.videoOrder)) };
      } else {
        // Auto-generate from component order
        plateVideoOrderEditing = { batchId, videoOrder: generateDefaultVideoOrder(batch) };
      }
    }

    function generateDefaultVideoOrder(batch) {
      const order = [];
      (batch.components || []).forEach(comp => {
        if (comp.type !== 'recipe' || !comp.recipeId) return;
        const r = getRecipeById(comp.recipeId);
        if (!r || !r.videoClips || r.videoClips.length === 0) return;
        const sorted = r.videoClips.slice().sort((a,b) => (a.order||0)-(b.order||0));
        sorted.forEach((clip, idx) => {
          order.push({ recipeId: comp.recipeId, clipIndex: idx });
        });
      });
      return order;
    }

    function savePlateVideoOrder(batchId) {
      if (!plateVideoOrderEditing || plateVideoOrderEditing.batchId !== batchId) return;
      const batch = batchRecipes.find(b => b.id === batchId);
      if (!batch) return;
      batch.videoOrder = JSON.parse(JSON.stringify(plateVideoOrderEditing.videoOrder));
      saveToLS('batchRecipes', batchRecipes);
      showToast('Video order saved!', 'success');
    }

    // Plate video order drag and drop
    let plateVODragIdx = null;
    function onPlateVODragStart(e, idx) {
      plateVODragIdx = idx;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onPlateVODragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function onPlateVODrop(e, dropIdx) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (plateVODragIdx === null || plateVODragIdx === dropIdx || !plateVideoOrderEditing) return;
      const vo = plateVideoOrderEditing.videoOrder;
      const item = vo.splice(plateVODragIdx, 1)[0];
      vo.splice(dropIdx, 0, item);
      plateVODragIdx = null;
      renderRightPanel();
    }
    function movePlateVOItem(idx, dir) {
      if (!plateVideoOrderEditing) return;
      const vo = plateVideoOrderEditing.videoOrder;
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= vo.length) return;
      [vo[idx], vo[newIdx]] = [vo[newIdx], vo[idx]];
      renderRightPanel();
    }

    // ============================================================
    // RECIPE SELECTION & CLIP EDITOR
    // ============================================================
    // Parse recipe instructions string into numbered steps array
    function parseRecipeInstructions(recipe) {
      const raw = Array.isArray(recipe.instructions)
        ? recipe.instructions.join('\n')
        : (recipe.instructions || '').trim();
      if (!raw) return [];
      const lines = raw.split('\n');
      const steps = [];
      let currentStep = null;

      lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        if (/^\d+[\.\)]\s*/.test(trimmed)) {
          if (currentStep) steps.push(currentStep);
          currentStep = trimmed.replace(/^\d+[\.\)]\s*/, '');
        } else if (currentStep) {
          currentStep += ' ' + trimmed;
        } else {
          steps.push(trimmed);
          currentStep = null;
        }
      });
      if (currentStep) steps.push(currentStep);
      return steps;
    }

    function selectRecipe(id) {
      selectedRecipeId = id;
      selectedPlateId = null;
      const r = getRecipeById(id);
      if (!r) return;
      // Deep copy clips for editing
      editingClips = (r.videoClips || []).slice().sort((a,b) => (a.order||0)-(b.order||0)).map(c => ({
        cloudflareVideoId: c.cloudflareVideoId || '',
        caption: c.caption || '',
        instructions: c.instructions || '',
        linkedSteps: Array.isArray(c.linkedSteps) ? [...c.linkedSteps] : [],
        notes: c.notes || '',
        order: c.order || 0,
        _validated: !!c.cloudflareVideoId,
        _showPreview: false
      }));
      renderRecipeList();
      renderPlatesSection();
      renderClipEditor();
    }

    function renderClipEditor() {
      const r = getRecipeById(selectedRecipeId);
      if (!r) return;

      const thumb = recipeThumb(r);
      const editor = document.getElementById('editorContent');

      editor.innerHTML = `
        <!-- Selected recipe header -->
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
          ${thumb ? `<img src="${esc(thumb)}" style="width:64px; height:64px; border-radius:12px; object-fit:cover;" />` :
            `<div style="width:64px; height:64px; border-radius:12px; background:var(--elevated); display:flex; align-items:center; justify-content:center; font-size:24px;">🍽</div>`}
          <div>
            <div style="font-size:17px; font-weight:700;">${esc(r.title)}</div>
            <div style="font-size:13px; color:var(--text-muted);">${editingClips.length} clip${editingClips.length !== 1 ? 's' : ''}</div>
          </div>
        </div>

        <!-- Clips list -->
        <div id="clipsList">
          ${editingClips.length === 0 ? `
            <div style="padding:32px; text-align:center; color:var(--text-muted); font-size:14px; background:var(--surface); border-radius:12px;">
              No clips yet. Add your first clip below.
            </div>
          ` : editingClips.map((clip, idx) => renderClipCard(clip, idx)).join('')}
        </div>

        <!-- Add clip button -->
        <button onclick="addClip()" class="btn-secondary" style="width:100%; margin-top:12px; padding:12px; display:flex; align-items:center; justify-content:center; gap:6px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
          Add Clip
        </button>

        <!-- Preview button -->
        <button onclick="previewClips()" class="btn-secondary" style="width:100%; margin-top:12px; padding:12px; display:flex; align-items:center; justify-content:center; gap:8px; ${editingClips.filter(c => c.cloudflareVideoId && c.cloudflareVideoId.trim()).length === 0 ? 'opacity:0.4; pointer-events:none;' : ''}"
          ${editingClips.filter(c => c.cloudflareVideoId && c.cloudflareVideoId.trim()).length === 0 ? 'disabled' : ''}>
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"/></svg>
          Preview video (${editingClips.filter(c => c.cloudflareVideoId && c.cloudflareVideoId.trim()).length} clips)
        </button>

        <!-- Save button -->
        <button onclick="saveClips()" class="btn-primary" style="width:100%; margin-top:12px; padding:14px;">
          Save Clips
        </button>
      `;
    }

    function renderClipCard(clip, idx) {
      const thumbUrl = clip.cloudflareVideoId ? getStreamThumbnail(clip.cloudflareVideoId) : '';
      const hasId = !!clip.cloudflareVideoId;

      return `
        <div class="clip-card" draggable="true"
          ondragstart="onClipDragStart(event, ${idx})"
          ondragover="onClipDragOver(event)"
          ondragenter="event.currentTarget.classList.add('drag-over')"
          ondragleave="event.currentTarget.classList.remove('drag-over')"
          ondrop="onClipDrop(event, ${idx})">

          <!-- Drag handle -->
          <div class="drag-handle">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/>
              <circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/>

            </svg>
          </div>

          <!-- Content -->
          <div class="clip-content">

            <div>
              <label style="font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:2px; display:block;">Cloudflare Video ID</label>
              <input type="text" value="${esc(clip.cloudflareVideoId)}"
                placeholder="e.g. 68c030875f569b166db2964f7237d7d9"
                oninput="updateClipField(${idx}, 'cloudflareVideoId', this.value); validateVideoId(${idx}, this.value);"
                style="font-family:monospace; font-size:12px;" />
              <div id="clipValidation_${idx}" style="margin-top:4px;">
                ${hasId && clip._validated ? `<span class="validation-ok">✓ Video found</span>` : ''}
              </div>
            </div>

            <!-- Thumbnail + ID display row -->
            ${hasId ? `
              <div style="display:flex; gap:10px; align-items:flex-start;">
                <img src="${esc(thumbUrl)}" class="clip-thumb" id="clipThumb_${idx}"
                  onerror="this.style.display='none'; document.getElementById('clipValidation_${idx}').innerHTML='<span class=\\'validation-err\\'>✗ Invalid video ID</span>';"
                  onload="document.getElementById('clipValidation_${idx}').innerHTML='<span class=\\'validation-ok\\'>✓ Video found</span>';" />
                <div class="video-id">${esc(clip.cloudflareVideoId)}</div>
              </div>
            ` : ''}

            <!-- Caption -->
            <div>
              <label style="font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:2px; display:block;">Caption</label>
              <input type="text" value="${esc(clip.caption)}" placeholder="e.g. Prep ingredients"
                oninput="updateClipField(${idx}, 'caption', this.value)" />
            </div>

            <!-- Linked instruction steps -->
            <div>
              <label style="font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:4px; display:block;">Linked Instructions</label>

            </div>

            <!-- Additional notes -->
            <div>
              <label style="font-size:11px; color:var(--text-muted); font-weight:500; margin-bottom:2px; display:block;">Additional Notes <span style="color:var(--text-tertiary);">(optional)</span></label>
              <textarea placeholder="Extra tips not covered by instruction steps..."
                rows="2" oninput="updateClipField(${idx}, 'notes', this.value)">${esc(clip.notes || '')}</textarea>
            </div>

            <!-- Preview button & player -->
            ${hasId ? `
              <button class="btn-ghost" style="font-size:12px; color:var(--primary); padding:4px 0; text-align:left;" onclick="togglePreview(${idx})">
                ${clip._showPreview ? '▾ Hide Preview' : '▸ Preview'}
              </button>
              ${clip._showPreview ? `
                <iframe src="${getStreamEmbedUrl(clip.cloudflareVideoId, { autoplay: false, muted: true, controls: true, loop: false })}"
                  class="mini-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
              ` : ''}
            ` : ''}
          </div>

          <!-- Actions: up/down/delete -->
          <div class="clip-actions">
            <button class="btn-ghost" onclick="moveClip(${idx}, -1)" title="Move up" ${idx === 0 ? 'disabled style="opacity:0.3;"' : ''}>
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5"/></svg>
            </button>
            <button class="btn-ghost" onclick="moveClip(${idx}, 1)" title="Move down" ${idx === editingClips.length - 1 ? 'disabled style="opacity:0.3;"' : ''}>
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </button>
            <button class="btn-ghost" onclick="deleteClip(${idx})" title="Delete clip" style="color:var(--danger);">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
            </button>
          </div>
        </div>
      `;
    }

    // ============================================================
    // CLIP EDITING ACTIONS
    // ============================================================
    function updateClipField(idx, field, value) {
      if (editingClips[idx]) editingClips[idx][field] = value;
    }

    function validateVideoId(idx, videoId) {
      const id = (videoId || '').trim();
      const el = document.getElementById('clipValidation_' + idx);
      if (!el) return;
      if (!id) { el.innerHTML = ''; return; }

      // Try loading thumbnail to validate
      const img = new Image();
      img.onload = () => {
        el.innerHTML = '<span class="validation-ok">✓ Video found</span>';
        editingClips[idx]._validated = true;
        // Update thumbnail display
        const thumbEl = document.getElementById('clipThumb_' + idx);
        if (thumbEl) { thumbEl.src = getStreamThumbnail(id); thumbEl.style.display = ''; }
        else renderClipEditor(); // re-render to show thumb
      };
      img.onerror = () => {
        el.innerHTML = '<span class="validation-err">✗ Invalid video ID</span>';
        editingClips[idx]._validated = false;
      };
      img.src = getStreamThumbnail(id);
    }

    function renderInstructionStepsPicker(clip, idx) {
      const r = getRecipeById(selectedRecipeId);
      if (!r) return '';
      const steps = parseRecipeInstructions(r);
      if (steps.length === 0) {
        const recipeId = r.__backendId || r.id;
        return `
          <div style="padding:12px; background:rgba(255,255,255,0.03); border-radius:8px; border:1px dashed rgba(255,255,255,0.1);">
            <div style="color:var(--text-muted); font-size:13px; margin-bottom:6px;">No instructions found.</div>
            <div style="font-size:12px; color:var(--text-tertiary);">Add instructions to this recipe first, then come back to link them to clips.</div>
          </div>
        `;
      }
      const linked = clip.linkedSteps || [];
      return `
        <div style="display:flex; flex-direction:column; gap:2px; max-height:200px; overflow-y:auto; padding:4px 0;">
          ${steps.map((step, stepIdx) => {
            const stepNum = stepIdx + 1;
            const isChecked = linked.includes(stepNum);
            return `
              <label style="display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; background:${isChecked ? 'rgba(232,93,93,0.08)' : 'transparent'}; transition:background 0.15s;"
                onmouseenter="this.style.background='${isChecked ? 'rgba(232,93,93,0.12)' : 'rgba(255,255,255,0.03)'}'"
                onmouseleave="this.style.background='${isChecked ? 'rgba(232,93,93,0.08)' : 'transparent'}'">
                <input type="checkbox" ${isChecked ? 'checked' : ''}
                  onchange="toggleLinkedStep(${idx}, ${stepNum})"
                  style="accent-color:var(--primary); margin-top:2px; flex-shrink:0; width:16px; height:16px;" />
                <span style="font-size:13px; color:${isChecked ? 'var(--text)' : 'var(--text-muted)'}; line-height:1.4;">
                  <span style="color:var(--text-tertiary); font-weight:600; font-size:11px; margin-right:4px;">${stepNum}.</span>${esc(step)}
                </span>
              </label>
            `;
          }).join('')}
        </div>
        ${linked.length > 0 ? `<div style="font-size:11px; color:var(--text-tertiary); margin-top:4px;">Linked: step${linked.length > 1 ? 's' : ''} ${linked.join(', ')}</div>` : ''}
      `;
    }

    function toggleLinkedStep(clipIdx, stepNum) {
      const clip = editingClips[clipIdx];
      if (!clip) return;
      if (!clip.linkedSteps) clip.linkedSteps = [];
      const pos = clip.linkedSteps.indexOf(stepNum);
      if (pos >= 0) {
        clip.linkedSteps.splice(pos, 1);
      } else {
        clip.linkedSteps.push(stepNum);
        clip.linkedSteps.sort((a, b) => a - b);
      }
      renderClipEditor();
    }

    function addClip() {
      editingClips.push({
        cloudflareVideoId: '',
        caption: '',
        instructions: '',
        linkedSteps: [],
        notes: '',
        order: editingClips.length + 1,
        _validated: false,
        _showPreview: false
      });
      renderClipEditor();
      // Scroll to bottom
      setTimeout(() => {
        const panel = document.querySelector('.clip-editor-panel');
        if (panel) panel.scrollTop = panel.scrollHeight;
      }, 50);
    }

    function deleteClip(idx) {
      editingClips.splice(idx, 1);
      renderClipEditor();
    }

    function moveClip(idx, dir) {
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= editingClips.length) return;
      [editingClips[idx], editingClips[newIdx]] = [editingClips[newIdx], editingClips[idx]];
      renderClipEditor();
    }

    function togglePreview(idx) {
      editingClips[idx]._showPreview = !editingClips[idx]._showPreview;
      renderClipEditor();
    }

    // Clip drag and drop
    let clipDragIdx = null;
    function onClipDragStart(e, idx) {
      clipDragIdx = idx;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onClipDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function onClipDrop(e, dropIdx) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (clipDragIdx === null || clipDragIdx === dropIdx) return;
      const item = editingClips.splice(clipDragIdx, 1)[0];
      editingClips.splice(dropIdx, 0, item);
      clipDragIdx = null;
      renderClipEditor();
    }

    // ============================================================
    // SAVE CLIPS
    // ============================================================
    function saveClips() {
      if (!selectedRecipeId) return;
      const r = getRecipeById(selectedRecipeId);
      if (!r) return;

      // Parse the recipe's instruction steps for building instructions text
      const recipeSteps = parseRecipeInstructions(r);

      // Filter out clips with no video ID
      const validClips = editingClips
        .filter(c => c.cloudflareVideoId && c.cloudflareVideoId.trim())
        .map((c, i) => {
          // Build instructions text from linked steps
          const linked = (c.linkedSteps || []).filter(n => n >= 1 && n <= recipeSteps.length);
          const stepsText = linked.map(n => `${n}. ${recipeSteps[n - 1]}`).join('\n');
          const notesText = (c.notes || '').trim();
          let fullInstructions = stepsText;
          if (notesText) fullInstructions += (fullInstructions ? '\n\n' : '') + notesText;

          return {
            cloudflareVideoId: c.cloudflareVideoId.trim(),
            caption: c.caption || '',
            instructions: fullInstructions || c.instructions || '',
            linkedSteps: linked,
            notes: notesText,
            order: i + 1
          };
        });

      r.videoClips = validClips;
      saveToLS('recipes', recipes);

      // Re-read to sync
      recipes = loadFromLS('recipes', []);

      showToast(`Saved ${validClips.length} clip${validClips.length !== 1 ? 's' : ''} for ${r.title}`, 'success');
      renderRecipeList();

      // Re-select to refresh editor
      selectRecipe(selectedRecipeId);
    }

    // ============================================================
    // PLATE VIDEO SEQUENCE & PREVIEW
    // ============================================================

    function buildPlateVideoSequence(batch) {
      const comps = (batch.components || []).filter(c => c.type === 'recipe' && c.recipeId);
      const sequence = [];

      if (batch.videoOrder && batch.videoOrder.length > 0) {
        // Use custom video order
        batch.videoOrder.forEach(ref => {
          const r = getRecipeById(ref.recipeId);
          if (!r || !r.videoClips) return;
          const sorted = r.videoClips.slice().sort((a,b) => (a.order||0)-(b.order||0));
          const clip = sorted[ref.clipIndex];
          if (!clip || !clip.cloudflareVideoId || !clip.cloudflareVideoId.trim()) return;
          const recipeSteps = parseRecipeInstructions(r);
          const linked = (clip.linkedSteps || []).filter(n => n >= 1 && n <= recipeSteps.length);
          const stepsText = linked.map(n => `${n}. ${recipeSteps[n - 1]}`).join('\n');
          const notesText = (clip.notes || '').trim();
          let fullInstructions = stepsText;
          if (notesText) fullInstructions += (fullInstructions ? '\n\n' : '') + notesText;
          sequence.push({
            type: 'clip',
            cloudflareVideoId: clip.cloudflareVideoId.trim(),
            caption: clip.caption || '',
            instructions: fullInstructions || clip.instructions || '',
            componentName: r.title || 'Unknown'
          });
        });
      } else {
        // Default: component order
        comps.forEach(comp => {
          const r = getRecipeById(comp.recipeId);
          if (!r || !r.videoClips || r.videoClips.length === 0) return;
          const sorted = r.videoClips.slice().sort((a,b) => (a.order||0)-(b.order||0));
          const recipeSteps = parseRecipeInstructions(r);
          sorted.forEach(clip => {
            if (!clip.cloudflareVideoId || !clip.cloudflareVideoId.trim()) return;
            const linked = (clip.linkedSteps || []).filter(n => n >= 1 && n <= recipeSteps.length);
            const stepsText = linked.map(n => `${n}. ${recipeSteps[n - 1]}`).join('\n');
            const notesText = (clip.notes || '').trim();
            let fullInstructions = stepsText;
            if (notesText) fullInstructions += (fullInstructions ? '\n\n' : '') + notesText;
            sequence.push({
              type: 'clip',
              cloudflareVideoId: clip.cloudflareVideoId.trim(),
              caption: clip.caption || '',
              instructions: fullInstructions || clip.instructions || '',
              componentName: r.title || 'Unknown'
            });
          });
        });
      }
      return sequence;
    }

    function previewPlateVideo(batchId) {
      const batch = batchRecipes.find(b => b.id === batchId);
      if (!batch) return;
      const sequence = buildPlateVideoSequence(batch);
      if (sequence.length === 0) return;
      previewState = { sequence, currentIndex: 0, muted: true };
      document.body.style.overflow = 'hidden';
      renderPreviewOverlay();
    }

    // PREVIEW — fullscreen video overlay matching user experience
    // ============================================================
    let previewState = null; // { sequence, currentIndex, muted }

    function previewClips() {
      const r = getRecipeById(selectedRecipeId);
      if (!r) return;
      const recipeSteps = parseRecipeInstructions(r);

      // Build sequence from current editing state (unsaved)
      const sequence = editingClips
        .filter(c => c.cloudflareVideoId && c.cloudflareVideoId.trim())
        .map(c => {
          const linked = (c.linkedSteps || []).filter(n => n >= 1 && n <= recipeSteps.length);
          const stepsText = linked.map(n => `${n}. ${recipeSteps[n - 1]}`).join('\n');
          const notesText = (c.notes || '').trim();
          let fullInstructions = stepsText;
          if (notesText) fullInstructions += (fullInstructions ? '\n\n' : '') + notesText;
          return {
            type: 'clip',
            cloudflareVideoId: c.cloudflareVideoId.trim(),
            caption: c.caption || '',
            instructions: fullInstructions || c.instructions || '',
            componentName: null
          };
        });
      if (sequence.length === 0) return;

      previewState = { sequence, currentIndex: 0, muted: true };
      document.body.style.overflow = 'hidden';
      renderPreviewOverlay();
    }

    function closePreview() {
      previewState = null;
      document.body.style.overflow = '';
      const overlay = document.getElementById('previewOverlay');
      if (overlay) overlay.remove();
    }

    function previewGoTo(idx) {
      if (!previewState) return;
      if (idx < 0 || idx >= previewState.sequence.length) return;
      previewState.currentIndex = idx;
      renderPreviewOverlay();
    }

    function togglePreviewMute() {
      if (!previewState) return;
      previewState.muted = !previewState.muted;
      renderPreviewOverlay();
    }

    function renderPreviewOverlay() {
      if (!previewState) return;
      const { sequence, currentIndex, muted } = previewState;
      const item = sequence[currentIndex];
      if (!item) return;
      const total = sequence.length;
      const isFirst = currentIndex === 0;
      const isLast = currentIndex === total - 1;

      const embedUrl = getStreamEmbedUrl(item.cloudflareVideoId, { autoplay: true, muted, controls: false, loop: true });

      // Progress bar
      let progressHtml = '';
      if (total > 1) {
        progressHtml = `
          <div style="display:flex; align-items:center; gap:8px; padding:8px 16px 4px;">
            <div style="display:flex; flex:1; gap:3px;">
              ${sequence.map((s, i) => {
                let c;
                if (i === currentIndex) c = 'var(--primary)';
                else if (i < currentIndex) c = 'rgba(255,255,255,0.85)';
                else c = 'rgba(255,255,255,0.2)';
                return `<button onclick="previewGoTo(${i})" style="flex:1; height:3px; border-radius:2px; border:none; padding:0; background:${c}; cursor:pointer;"></button>`;
              }).join('')}
            </div>
            <div style="color:var(--text-muted); font-size:13px; white-space:nowrap;">${currentIndex + 1} of ${total}</div>
          </div>
        `;
      }

      // Instructions
      const caption = item.caption || '';
      const instructions = item.instructions || '';
      const componentLabel = item.componentName ? `<div style="color:var(--text-muted); font-size:13px; margin-bottom:6px;">From: ${esc(item.componentName)}</div>` : '';
      const instructionsHtml = `
        ${componentLabel}
        ${caption ? `<div style="color:#fff; font-size:20px; font-weight:700; margin-bottom:8px;">${esc(caption)}</div>` : ''}
        ${instructions ? `<div style="color:#fff; font-size:16px; line-height:1.5; white-space:pre-line;">${esc(instructions)}</div>` : `<div style="color:var(--text-muted); font-size:16px; font-style:italic;">No instructions for this clip</div>`}
      `;

      // Nav controls
      let navHtml = '';
      if (total > 1) {
        const prevBtn = !isFirst
          ? `<button onclick="previewGoTo(${currentIndex - 1})" style="background:none; border:none; color:var(--text-muted); font-size:15px; cursor:pointer; padding:8px 0;">\u2190 Previous</button>`
          : `<div></div>`;
        const nextBtn = !isLast
          ? `<button onclick="previewGoTo(${currentIndex + 1})" style="background:none; border:none; color:var(--primary); font-size:15px; font-weight:600; cursor:pointer; padding:8px 0;">Next \u2192</button>`
          : `<button onclick="closePreview()" style="background:none; border:none; color:var(--primary); font-size:15px; font-weight:600; cursor:pointer; padding:8px 0;">Done</button>`;
        navHtml = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.08);">
            ${prevBtn}${nextBtn}
          </div>
        `;
      }

      const html = `
        <div id="previewOverlay" style="position:fixed; top:0; left:0; width:100%; height:100dvh; background:#000; z-index:9999; display:flex; flex-direction:column;">
          <!-- Close -->
          <button onclick="closePreview()" style="position:absolute; top:12px; right:12px; z-index:10001; width:36px; height:36px; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;">
            <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>

          <!-- Video area -->
          <div id="previewVideoArea" style="flex:0 0 68vh; overflow:hidden; position:relative;">
            <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#000;">
              <div style="position:relative; width:100%; max-width:500px; height:100%;">
                <iframe src="${embedUrl}" style="width:100%; height:100%; border:none;"
                  allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                <!-- Mute -->
                <button onclick="togglePreviewMute()" style="position:absolute; bottom:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10;">
                  ${muted
                    ? `<svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`
                    : `<svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>`}
                </button>
                <!-- Left nav -->
                ${!isFirst && total > 1 ? `
                <button onclick="previewGoTo(${currentIndex - 1})" style="position:absolute; left:8px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.2); backdrop-filter:blur(4px); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10;">
                  <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </button>` : ''}
                <!-- Right nav -->
                ${!isLast && total > 1 ? `
                <button onclick="previewGoTo(${currentIndex + 1})" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.2); backdrop-filter:blur(4px); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10;">
                  <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </button>` : ''}
              </div>
            </div>
          </div>

          ${progressHtml}

          <!-- Instructions -->
          <div style="flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch;">
            ${instructionsHtml}
            ${navHtml}
          </div>

          <div style="flex-shrink:0; height:env(safe-area-inset-bottom, 0px);"></div>
        </div>
        <style>
          @media (min-width: 768px) { #previewVideoArea { flex: 0 0 78vh !important; } }
          @media (max-width: 767px) { #previewVideoArea { flex: 0 0 65vh !important; } }
        </style>
      `;

      const existing = document.getElementById('previewOverlay');
      if (existing) {
        existing.outerHTML = html;
      } else {
        document.body.insertAdjacentHTML('beforeend', html);
      }

      // Swipe gestures
      setTimeout(initPreviewSwipe, 50);
    }

    function initPreviewSwipe() {
      const area = document.getElementById('previewVideoArea');
      if (!area || !previewState || previewState.sequence.length <= 1) return;
      const clone = area.cloneNode(true);
      area.parentNode.replaceChild(clone, area);
      let startX = 0, currentX = 0, swiping = false;
      clone.addEventListener('touchstart', e => { startX = e.touches[0].clientX; currentX = startX; swiping = true; }, { passive: true });
      clone.addEventListener('touchmove', e => { if (swiping) currentX = e.touches[0].clientX; }, { passive: true });
      clone.addEventListener('touchend', () => {
        if (!swiping) return;
        swiping = false;
        const diff = currentX - startX;
        const idx = previewState.currentIndex;
        const max = previewState.sequence.length - 1;
        if (diff < -60 && idx < max) previewGoTo(idx + 1);
        else if (diff > 60 && idx > 0) previewGoTo(idx - 1);
      });
    }

    // Keyboard nav for preview overlay
    document.addEventListener('keydown', (e) => {
      if (!previewState) return;
      if (e.key === 'Escape') closePreview();
      else if (e.key === 'ArrowLeft') { e.preventDefault(); previewGoTo(previewState.currentIndex - 1); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); previewGoTo(previewState.currentIndex + 1); }
    });

    // ============================================================
    // INIT
    // ============================================================
    renderRecipeList();
    renderPlatesSection();
  </script>
</body>
</html>
